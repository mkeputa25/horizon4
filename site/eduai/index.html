<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>EduAI · Horizon4 AI — AI for serious educational institutions</title>
  <meta name="description" content="Faculty readiness, academic integrity, and university governance for the AI era. Built for institutions preparing graduates and protecting credentials.">
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/site.css">
  <style>
    /* ━━━ GovAI page-local styles ━━━ */

    /* Hero variant: full-width content, no sphere */
    .gov-hero {
      background: var(--bg-base);
      padding: 160px 0 96px;
      text-align: center;
    }
    .gov-hero .container { max-width: 880px; }
    .gov-hero .eyebrow { justify-content: center; margin-bottom: 24px; color: var(--accent-primary); }
    .gov-hero .h1 { margin-bottom: 24px; text-wrap: balance; }
    .gov-hero .hero-lead { max-width: 60ch; margin: 0 auto 40px; }
    .gov-hero .hero-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    @media (max-width: 768px) {
      .gov-hero { padding: 96px 0 64px; }
    }

    /* Generic icon-card (Sections 2, 3) */
    .icon-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .icon-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
    .icon-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
    @media (max-width: 1024px) {
      .icon-grid, .icon-grid.cols-3 { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .icon-grid, .icon-grid.cols-2, .icon-grid.cols-3 { grid-template-columns: 1fr; }
    }
    .icon-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius);
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: border-color .24s var(--ease);
    }
    .icon-card .icon { color: var(--ink-primary); }
    .icon-card .eyebrow { color: var(--ink-muted); margin: 0; }
    .icon-card .card-h { font-size: var(--type-h4); font-weight: 700; line-height: 1.25; color: var(--ink-primary); margin: 0; letter-spacing: -0.005em; }
    .icon-card .body { font-size: var(--type-body); line-height: 1.6; color: var(--ink-body); margin: 0; }
    .icon-card:hover { border-color: var(--border-strong); }

    /* Numbered offering cards (Section 4) */
    .offering-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    @media (max-width: 1024px) { .offering-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 640px)  { .offering-grid { grid-template-columns: 1fr; } }
    .offering-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius);
      padding: 32px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .offering-card .num {
      font-family: var(--font-mono);
      font-size: 14px;
      letter-spacing: 0.06em;
      color: var(--accent-primary);
      font-weight: 600;
    }
    .offering-card .card-h { font-size: var(--type-h4); font-weight: 700; line-height: 1.25; margin: 0; color: var(--ink-primary); }
    .offering-card .body { font-size: var(--type-body); line-height: 1.6; color: var(--ink-body); margin: 0; }

    /* Frameworks card with bottom meta line */
    .fw-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius);
      padding: 28px;
      display: flex; flex-direction: column; gap: 14px;
      min-height: 220px;
    }
    .fw-card .eyebrow { color: var(--ink-muted); margin: 0; }
    .fw-card .card-h  { font-size: var(--type-h4); font-weight: 700; line-height: 1.25; margin: 0; color: var(--ink-primary); }
    .fw-card .body    { font-size: 15px; line-height: 1.6; color: var(--ink-body); margin: 0; }
    .fw-card .meta    { margin-top: auto; padding-top: 14px; border-top: 1px solid var(--border-hairline);
                        font-family: var(--font-mono); font-size: 13px; color: var(--ink-muted); }
    .fw-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }
    @media (max-width: 1024px) { .fw-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 640px)  { .fw-grid { grid-template-columns: 1fr; } }

    /* Engagement cards (Section 7) — flagship variant */
    .eng-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      align-items: stretch;
    }
    @media (max-width: 1024px) { .eng-grid { grid-template-columns: 1fr; } }
    .eng-card {
      position: relative;
      background: var(--bg-surface);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius);
      padding: 32px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .eng-card.flagship {
      border-color: rgba(0, 117, 201, 0.30);
      box-shadow: 0 8px 24px rgba(0, 117, 201, 0.06);
    }
    .eng-card.flagship::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--accent-primary);
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .eng-card .tag { font-family: var(--font-sans); font-size: var(--type-eyebrow); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; color: var(--ink-muted); }
    .eng-card.flagship .tag { color: var(--accent-primary); }
    .eng-card .hr { height: 1px; background: var(--border-hairline); margin: 0; border: none; }
    .eng-card .card-h { font-size: var(--type-h3); font-weight: 700; line-height: 1.15; color: var(--ink-primary); margin: 0; letter-spacing: -0.01em; }
    .eng-card .meta { font-size: var(--type-body-xl); color: var(--ink-muted); margin: 0; }
    .eng-card .body { font-size: var(--type-body); line-height: 1.6; color: var(--ink-body); margin: 0; }
    .eng-card .bullets {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex; flex-direction: column; gap: 8px;
    }
    .eng-card .bullets li {
      font-size: 15px;
      line-height: 1.5;
      color: var(--ink-body);
      padding-left: 22px;
      position: relative;
    }
    .eng-card .bullets li::before {
      content: '';
      position: absolute;
      left: 6px; top: 0.55em;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent-secondary);
    }
    .eng-card .foot {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
      margin-top: auto;
    }
    .eng-card .price {
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    .eng-card .cta-link {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent-primary);
      text-decoration: none;
    }
    .eng-card .cta-link:hover { color: var(--accent-primary-h); }

    /* FAQ accordion */
    .faq-list {
      max-width: 880px;
      margin: 0 auto;
      display: flex; flex-direction: column;
    }
    .faq-item {
      border-top: 1px solid var(--border-hairline);
      padding: 0;
    }
    .faq-item:last-of-type { border-bottom: 1px solid var(--border-hairline); }
    .faq-item summary {
      cursor: pointer;
      list-style: none;
      padding: 24px 0;
      display: flex; justify-content: space-between; align-items: center; gap: 24px;
      font-size: var(--type-h4);
      font-weight: 600;
      color: var(--ink-primary);
      letter-spacing: -0.005em;
    }
    .faq-item summary::-webkit-details-marker { display: none; }
    .faq-item .chev {
      flex-shrink: 0;
      width: 18px; height: 18px;
      color: var(--ink-muted);
      transition: transform .24s var(--ease);
    }
    .faq-item[open] .chev { transform: rotate(180deg); }
    .faq-item .ans {
      font-size: var(--type-body);
      line-height: 1.65;
      color: var(--ink-body);
      max-width: 70ch;
      padding: 0 0 28px;
    }

    /* Related horizons mini cards */
    .rel-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    @media (max-width: 1024px) { .rel-grid { grid-template-columns: 1fr; } }
    .rel-card {
      display: flex; flex-direction: column; gap: 14px;
      padding: 28px;
      background: var(--bg-surface);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius);
      text-decoration: none;
      color: inherit;
      transition: border-color .24s var(--ease), box-shadow .24s var(--ease);
    }
    .rel-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-card); }
    .rel-card .eyebrow { color: var(--ink-muted); margin: 0; }
    .rel-card .card-h { font-size: var(--type-h4); font-weight: 700; color: var(--ink-primary); margin: 0; }
    .rel-card .body { font-size: var(--type-body); line-height: 1.6; color: var(--ink-body); margin: 0; }
    .rel-card .more { margin-top: auto; padding-top: 12px; font-size: 15px; font-weight: 600; color: var(--accent-primary); }

    /* Final CTA dark band — link row separated by middle dots */
    .gov-cta {
      background: var(--bg-deep);
      padding: 128px 0;
      text-align: center;
      color: #fff;
    }
    .gov-cta .container { max-width: 880px; }
    .gov-cta .eyebrow {
      justify-content: center;
      color: rgba(255, 255, 255, 0.65);
      margin-bottom: 24px;
    }
    .gov-cta .h2 { color: #fff; margin-bottom: 20px; text-wrap: balance; }
    .gov-cta .body-xl { color: var(--ink-on-dark-2); margin: 0 auto 40px; max-width: 60ch; }
    .gov-cta .links {
      display: inline-flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      font-size: var(--type-body-xl);
    }
    .gov-cta .links a {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1px solid rgba(255, 255, 255, 0.35);
      padding-bottom: 2px;
      transition: border-color .24s var(--ease);
    }
    .gov-cta .links a:hover { border-bottom-color: #fff; }
    .gov-cta .links .sep {
      color: rgba(255, 255, 255, 0.45);
      font-size: 22px;
      user-select: none;
    }
    @media (max-width: 768px) {
      .gov-cta { padding: 80px 0; }
      .gov-cta .links { flex-direction: column; gap: 14px; }
      .gov-cta .links .sep { display: none; }
    }

    /* Section bands — reusing tokens */
    .band { padding: var(--section-y) 0; }
    .band.surface { background: var(--bg-surface); }
    .band.base    { background: var(--bg-base); }
    @media (max-width: 768px) { .band { padding: var(--section-y-mobile) 0; } }
  </style>
</head>
<body>
  <script>
    // Suppress the benign "ResizeObserver loop completed with undelivered notifications" message.
    (function(){
      const re = /ResizeObserver loop/;
      if (typeof ResizeObserver !== 'undefined') {
        const Native = ResizeObserver;
        window.ResizeObserver = class extends Native {
          constructor(cb) {
            super((entries, observer) => {
              requestAnimationFrame(() => { try { cb(entries, observer); } catch (e) {} });
            });
          }
        };
      }
      window.addEventListener('error', (e) => {
        if (e && e.message && re.test(e.message)) {
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      });
      const origError = console.error;
      console.error = function(...args) {
        const msg = args.map(a => (a && a.message) || String(a)).join(' ');
        if (re.test(msg)) return;
        return origError.apply(console, args);
      };
    })();  </script>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       NAVIGATION (inherited from homepage)
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    const MEGA = {
      Academy: [
        { l: 'Overview & Pathways',   h: '/academy' },
        { l: 'Course Catalog',        h: '/academy/catalog' },
        { l: 'Private Team Training', h: '/academy/private' },
      ],
      Advisory: [
        { l: 'AI Readiness Audit',  h: '/audit' },
        { l: 'Executive Briefing',  h: '/executive-briefing' },
        { l: 'Donor / EU Programs', h: '/donor-programs' },
      ],
      Solutions: [
        { l: 'GovAI',      h: '/govai' },
        { l: 'EduAI',      h: '/eduai' },
        { l: 'BusinessAI', h: '/businessai' },
        { l: 'StrategyAI', h: '/strategyai' },
        { divider: true },
        { l: 'Agentic AI', h: '/agentic-ai' },
      ],
      Research: [
        { l: 'Publications', h: '/research/publications' },
        { l: 'Insights',     h: '/research/insights' },
        { l: 'Frameworks',   h: '/research/frameworks' },
      ],
      About: [
        { l: 'Team',    h: '/team' },
        { l: 'Mission', h: '/about' },
        { l: 'Contact', h: '/contact' },
      ],
    };

    const Brand = ({ className = 'nav-brand' }) => (
      <a href="/" className={className}>Horizon<span className="four">4</span>&nbsp;AI</a>
    );

    const Nav = () => {
      const [open, setOpen] = useState(null);
      const [drawer, setDrawer] = useState(false);
      const [lang, setLang] = useState('EN');
      const closeTimer = useRef(null);

      const onEnter = (k) => { clearTimeout(closeTimer.current); setOpen(k); };
      const onLeave = () => { closeTimer.current = setTimeout(() => setOpen(null), 120); };

      useEffect(() => { document.body.style.overflow = drawer ? 'hidden' : ''; }, [drawer]);

      return (
        <React.Fragment>
          <nav className="nav">
            <div className="nav-inner">
              <Brand/>
              <div className="nav-center">
                {Object.keys(MEGA).map(k => (
                  <div
                    key={k}
                    className={`nav-item ${open === k ? 'open' : ''}`}
                    onMouseEnter={() => onEnter(k)}
                    onMouseLeave={onLeave}
                  >
                    <button className="nav-trigger" aria-haspopup="true" aria-expanded={open === k}>
                      {k}<span className="chev"></span>
                    </button>
                    <div className="mega" role="menu">
                      {MEGA[k].map((item, i) => (
                        item.divider
                          ? <div key={`d${i}`} className="mega-divider" role="separator"></div>
                          : <a key={item.l} href={item.h}>{item.l}</a>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
              <div className="nav-right">
                <div className="nav-lang">
                  <button className={lang === 'EN' ? 'on' : ''} onClick={() => setLang('EN')}>EN</button>
                  <span className="div">|</span>
                  <button className={lang === 'SQ' ? 'on' : ''} onClick={() => setLang('SQ')}>SQ</button>
                </div>
                <a href="/executive-briefing" className="nav-cta">Request Executive Briefing</a>
                <button className="nav-burger" aria-label="Menu" onClick={() => setDrawer(true)}>
                  <span></span><span></span><span></span>
                </button>
              </div>
            </div>
          </nav>

          <div className={`drawer-overlay ${drawer ? 'open' : ''}`} onClick={() => setDrawer(false)}></div>
          <aside className={`drawer ${drawer ? 'open' : ''}`} aria-hidden={!drawer}>
            <div className="drawer-head">
              <Brand/>
              <button className="drawer-close" onClick={() => setDrawer(false)} aria-label="Close">×</button>
            </div>
            <div className="drawer-body">
              {Object.keys(MEGA).map(k => (
                <details key={k} className="drawer-group">
                  <summary>{k}</summary>
                  <div className="drawer-sub">
                    {MEGA[k].map((item, i) => (
                      item.divider ? null : <a key={item.l} href={item.h}>{item.l}</a>
                    ))}
                  </div>
                </details>
              ))}
            </div>
            <div className="drawer-foot">
              <a href="/executive-briefing" className="btn btn-primary">Request Executive Briefing</a>
              <div className="nav-lang" style={{ justifyContent: 'center' }}>
                <button className={lang === 'EN' ? 'on' : ''} onClick={() => setLang('EN')}>EN</button>
                <span className="div">|</span>
                <button className={lang === 'SQ' ? 'on' : ''} onClick={() => setLang('SQ')}>SQ</button>
              </div>
            </div>
          </aside>
        </React.Fragment>
      );
    };

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       SHARED ICONS (Lucide-style, 1.5px stroke)
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    const Icon = ({ children, size = 32 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
           stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"
           className="icon" aria-hidden="true">{children}</svg>
    );
    const IconBook = () => (
      <Icon>
        <path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v18H6.5A2.5 2.5 0 0 1 4 17.5v-13zM4 17.5A2.5 2.5 0 0 0 6.5 20H20"/>
      </Icon>
    );
    const IconChalk = () => (
      <Icon>
        <path d="M3 5h18v12H3z"/><path d="M3 19h18M8 9h8M8 13h5"/>
      </Icon>
    );
    const IconGov = () => (
      <Icon>
        <path d="M3 21h18M5 21V10M9 21V10M15 21V10M19 21V10M3 10h18M12 3l9 5H3l9-5z"/>
      </Icon>
    );
    const IconUni = () => (
      <Icon>
        <path d="M12 3 2 8l10 5 10-5-10-5z"/><path d="M6 10v6a6 6 0 0 0 12 0v-6"/><path d="M22 8v6"/>
      </Icon>
    );
    const IconSchool = () => (
      <Icon>
        <path d="M3 21h18M5 21V12l7-4 7 4v9M9 21v-5h6v5M9 11l3-1 3 1"/>
      </Icon>
    );
    const IconLaptop = () => (
      <Icon>
        <rect x="3" y="5" width="18" height="11" rx="1"/><path d="M2 19h20"/><path d="M9 9h6M9 12h6"/>
      </Icon>
    );
    const ChevDown = () => (
      <Icon size={18}><path d="M6 9l6 6 6-6"/></Icon>
    );

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       SECTION 1 — HERO
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    const Hero = () => (
      <section className="gov-hero" data-screen-label="Hero">
        <div className="container">
          <div className="eyebrow">Horizon 02 · EduAI</div>
          <h1 className="h1">AI for serious educational institutions.</h1>
          <p className="body-xl hero-lead">
            Faculty readiness, academic integrity, and university governance
            for the AI era. Built for institutions preparing graduates and
            protecting credentials.
          </p>
          <div className="hero-actions">
            <a href="/audit" className="btn btn-primary">Request Audit Scope</a>
            <a href="/executive-briefing" className="btn btn-secondary">Request Executive Briefing</a>
          </div>
        </div>
      </section>
    );

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       SECTION 2 — WHY GOVAI
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    const WhyGov = () => (
      <section className="band surface" data-screen-label="Why EduAI">
