<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Agents & Workflows · Horizon4 AI</title>
  <meta name="description" content="Local, human-approved AI assistants and workflow systems for reporting, documentation, administration, research, and service support. Workflow design before automation.">
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/site.css">
  <style>
    /* ━━━ Agentic AI page-local styles ━━━ */

    /* Hero variant: full-width content, no sphere */
    .gov-hero {
      background: var(--bg-base);
      padding: 160px 0 96px;
      text-align: center;
    }
    .gov-hero .container { max-width: 880px; }
    .gov-hero .eyebrow { justify-content: center; margin-bottom: 24px; color: var(--accent-primary); }
    .gov-hero .h1 { margin-bottom: 24px; text-wrap: balance; }
    .gov-hero .hero-lead { max-width: 60ch; margin: 0 auto 40px; }
    .gov-hero .hero-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    @media (max-width: 768px) {
      .gov-hero { padding: 96px 0 64px; }
    }

    /* Generic icon-card (Sections 2, 3) */
    .icon-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .icon-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
    .icon-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
    @media (max-width: 1024px) {
      .icon-grid, .icon-grid.cols-3 { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .icon-grid, .icon-grid.cols-2, .icon-grid.cols-3 { grid-template-columns: 1fr; }
    }
    .icon-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius);
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: border-color .24s var(--ease);
    }
    .icon-card .icon { color: var(--ink-primary); }
    .icon-card .eyebrow { color: var(--ink-muted); margin: 0; }
    .icon-card .card-h { font-size: var(--type-h4); font-weight: 700; line-height: 1.25; color: var(--ink-primary); margin: 0; letter-spacing: -0.005em; }
    .icon-card .body { font-size: var(--type-body); line-height: 1.6; color: var(--ink-body); margin: 0; }
    .icon-card:hover { border-color: var(--border-strong); }

    /* Numbered offering cards (Section 4) */
    .offering-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    @media (max-width: 1024px) { .offering-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 640px)  { .offering-grid { grid-template-columns: 1fr; } }
    .offering-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius);
      padding: 32px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .offering-card .num {
      font-family: var(--font-mono);
      font-size: 14px;
      letter-spacing: 0.06em;
      color: var(--accent-primary);
      font-weight: 600;
    }
    .offering-card .card-h { font-size: var(--type-h4); font-weight: 700; line-height: 1.25; margin: 0; color: var(--ink-primary); }
    .offering-card .body { font-size: var(--type-body); line-height: 1.6; color: var(--ink-body); margin: 0; }

    /* Frameworks card with bottom meta line */
    .fw-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius);
      padding: 28px;
      display: flex; flex-direction: column; gap: 14px;
      min-height: 220px;
    }
    .fw-card .eyebrow { color: var(--ink-muted); margin: 0; }
    .fw-card .card-h  { font-size: var(--type-h4); font-weight: 700; line-height: 1.25; margin: 0; color: var(--ink-primary); }
    .fw-card .body    { font-size: 15px; line-height: 1.6; color: var(--ink-body); margin: 0; }
    .fw-card .meta    { margin-top: auto; padding-top: 14px; border-top: 1px solid var(--border-hairline);
                        font-family: var(--font-mono); font-size: 13px; color: var(--ink-muted); }
    .fw-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }
    @media (max-width: 1024px) { .fw-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 640px)  { .fw-grid { grid-template-columns: 1fr; } }

    /* Engagement cards (Section 7) — flagship variant */
    .eng-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      align-items: stretch;
    }
    @media (max-width: 1024px) { .eng-grid { grid-template-columns: 1fr; } }
    .eng-card {
      position: relative;
      background: var(--bg-surface);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius);
      padding: 32px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .eng-card.flagship {
      border-color: rgba(0, 117, 201, 0.30);
      box-shadow: 0 8px 24px rgba(0, 117, 201, 0.06);
    }
    .eng-card.flagship::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--accent-primary);
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .eng-card .tag { font-family: var(--font-sans); font-size: var(--type-eyebrow); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; color: var(--ink-muted); }
    .eng-card.flagship .tag { color: var(--accent-primary); }
    .eng-card .hr { height: 1px; background: var(--border-hairline); margin: 0; border: none; }
    .eng-card .card-h { font-size: var(--type-h3); font-weight: 700; line-height: 1.15; color: var(--ink-primary); margin: 0; letter-spacing: -0.01em; }
    .eng-card .meta { font-size: var(--type-body-xl); color: var(--ink-muted); margin: 0; }
    .eng-card .body { font-size: var(--type-body); line-height: 1.6; color: var(--ink-body); margin: 0; }
    .eng-card .bullets {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex; flex-direction: column; gap: 8px;
    }
    .eng-card .bullets li {
      font-size: 15px;
      line-height: 1.5;
      color: var(--ink-body);
      padding-left: 22px;
      position: relative;
    }
    .eng-card .bullets li::before {
      content: '';
      position: absolute;
      left: 6px; top: 0.55em;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent-secondary);
    }
    .eng-card .foot {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
      margin-top: auto;
    }
    .eng-card .price {
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    .eng-card .cta-link {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent-primary);
      text-decoration: none;
    }
    .eng-card .cta-link:hover { color: var(--accent-primary-h); }

    /* FAQ accordion */
    .faq-list {
      max-width: 880px;
      margin: 0 auto;
      display: flex; flex-direction: column;
    }
    .faq-item {
      border-top: 1px solid var(--border-hairline);
      padding: 0;
    }
    .faq-item:last-of-type { border-bottom: 1px solid var(--border-hairline); }
    .faq-item summary {
      cursor: pointer;
      list-style: none;
      padding: 24px 0;
      display: flex; justify-content: space-between; align-items: center; gap: 24px;
      font-size: var(--type-h4);
      font-weight: 600;
      color: var(--ink-primary);
      letter-spacing: -0.005em;
    }
    .faq-item summary::-webkit-details-marker { display: none; }
    .faq-item .chev {
      flex-shrink: 0;
      width: 18px; height: 18px;
      color: var(--ink-muted);
      transition: transform .24s var(--ease);
    }
    .faq-item[open] .chev { transform: rotate(180deg); }
    .faq-item .ans {
      font-size: var(--type-body);
      line-height: 1.65;
      color: var(--ink-body);
      max-width: 70ch;
      padding: 0 0 28px;
    }

    /* Related horizons mini cards */
    .rel-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    @media (max-width: 1024px) { .rel-grid { grid-template-columns: 1fr; } }
    .rel-card {
      display: flex; flex-direction: column; gap: 14px;
      padding: 28px;
      background: var(--bg-surface);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius);
      text-decoration: none;
      color: inherit;
      transition: border-color .24s var(--ease), box-shadow .24s var(--ease);
    }
    .rel-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-card); }
    .rel-card .eyebrow { color: var(--ink-muted); margin: 0; }
    .rel-card .card-h { font-size: var(--type-h4); font-weight: 700; color: var(--ink-primary); margin: 0; }
    .rel-card .body { font-size: var(--type-body); line-height: 1.6; color: var(--ink-body); margin: 0; }
    .rel-card .more { margin-top: auto; padding-top: 12px; font-size: 15px; font-weight: 600; color: var(--accent-primary); }

    /* Final CTA dark band — link row separated by middle dots */
    .gov-cta {
      background: var(--bg-deep);
      padding: 128px 0;
      text-align: center;
      color: #fff;
    }
    .gov-cta .container { max-width: 880px; }
    .gov-cta .eyebrow {
      justify-content: center;
      color: rgba(255, 255, 255, 0.65);
      margin-bottom: 24px;
    }
    .gov-cta .h2 { color: #fff; margin-bottom: 20px; text-wrap: balance; }
    .gov-cta .body-xl { color: var(--ink-on-dark-2); margin: 0 auto 40px; max-width: 60ch; }
    .gov-cta .links {
      display: inline-flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      font-size: var(--type-body-xl);
    }
    .gov-cta .links a {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1px solid rgba(255, 255, 255, 0.35);
      padding-bottom: 2px;
      transition: border-color .24s var(--ease);
    }
    .gov-cta .links a:hover { border-bottom-color: #fff; }
    .gov-cta .links .sep {
      color: rgba(255, 255, 255, 0.45);
      font-size: 22px;
      user-select: none;
    }
    @media (max-width: 768px) {
      .gov-cta { padding: 80px 0; }
      .gov-cta .links { flex-direction: column; gap: 14px; }
      .gov-cta .links .sep { display: none; }
    }

    /* Agentic AI cuts across all four horizons — related grid shows 4 cards */
    .rel-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
    @media (max-width: 1024px) { .rel-grid.cols-4 { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 640px)  { .rel-grid.cols-4 { grid-template-columns: 1fr; } }

    /* Section bands — reusing tokens */
    .band { padding: var(--section-y) 0; }
    .band.surface { background: var(--bg-surface); }
    .band.base    { background: var(--bg-base); }
    @media (max-width: 768px) { .band { padding: var(--section-y-mobile) 0; } }

    /* Cross-sector example cards */
    .xs-card .list {
      list-style: none; padding: 0; margin: 0;
      display: flex; flex-direction: column; gap: 8px;
    }
    .xs-card .list li {
      font-size: 15px; line-height: 1.5; color: var(--ink-body);
      padding-left: 18px; position: relative;
    }
    .xs-card .list li::before {
      content: ''; position: absolute; left: 4px; top: 0.55em;
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent-secondary);
    }

    /* Agentic architecture flow */
    .arch-flow {
      display: flex; flex-wrap: wrap; align-items: stretch;
      gap: 0; justify-content: center;
    }
    .arch-step {
      flex: 1 1 130px;
      background: var(--bg-surface);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius);
      padding: 20px 16px;
      display: flex; flex-direction: column; gap: 8px;
      text-align: center;
      min-width: 130px;
    }
    .arch-step .step-num {
      font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.06em;
      color: var(--accent-primary); font-weight: 600;
    }
    .arch-step .step-label {
      font-size: 15px; font-weight: 700; line-height: 1.3; color: var(--ink-primary);
    }
    .arch-step.approval { border-color: rgba(0, 117, 201, 0.40); }
    .arch-arrow {
      display: flex; align-items: center; justify-content: center;
      color: var(--ink-muted); font-size: 18px;
      padding: 0 6px; flex: 0 0 auto;
    }
    @media (max-width: 768px) {
      .arch-flow { flex-direction: column; }
      .arch-step { width: 100%; }
      .arch-arrow { transform: rotate(90deg); padding: 4px 0; }
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       HOW AGENTS WORK: loop diagram + agentic demo console
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .how-works {
      background: var(--bg-base);
      padding: 96px 24px 80px;
      scroll-margin-top: 90px;
    }
    @media (max-width: 720px) { .how-works { padding: 64px 18px 56px; } }
    .how-works-inner { max-width: 1100px; margin: 0 auto; }
    .how-works-head {
      max-width: 720px; margin: 0 auto 40px; text-align: center;
    }
    .how-works-head h2 {
      font-size: clamp(28px, 3.4vw, 38px);
      font-weight: 700; letter-spacing: -0.015em; line-height: 1.15;
      color: var(--ink-primary); margin-bottom: 16px;
    }
    .how-works-head .eyebrow { margin-bottom: 12px; justify-content: center; }
    .how-works-head .body-xl {
      max-width: 60ch; margin: 0 auto;
      font-size: 17px; line-height: 1.55; color: var(--ink-body);
    }

    /* Loop diagram */
    .loop-wrap {
      background: var(--bg-surface);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      padding: 32px 28px 28px;
      margin-bottom: 28px;
    }
    .loop-svg {
      width: 100%; height: auto; display: block;
      font-family: var(--font-sans);
    }
    .loop-caption {
      margin: 18px auto 0;
      text-align: center; max-width: 56ch;
      font-size: 14px; line-height: 1.55; color: var(--ink-muted);
    }
    .loop-caption strong { color: var(--ink-primary); font-weight: 600; }

    /* Mobile loop: vertical stack with HTML chips */
    .loop-m {
      display: none;
      padding: 8px 0;
    }
    .loop-m-zone {
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius);
      padding: 14px 12px;
      margin-bottom: 18px;
      background: var(--bg-subtle);
    }
    .loop-m-zone .loop-m-eyebrow {
      font-size: 11px; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase; margin-bottom: 10px;
    }
    .loop-m-zone.is-agent .loop-m-eyebrow { color: var(--accent-secondary); }
    .loop-m-zone.is-human .loop-m-eyebrow { color: var(--accent-gold); }
    .loop-m-zone.is-system .loop-m-eyebrow { color: var(--accent-primary); }
    .loop-m-chip {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg-surface);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius);
      padding: 10px 12px;
      margin-bottom: 8px;
      font-size: 14px; color: var(--ink-primary); font-weight: 500;
    }
    .loop-m-chip:last-child { margin-bottom: 0; }
    .loop-m-chip .tab { width: 3px; height: 24px; border-radius: 1.5px; flex-shrink: 0; }
    .loop-m-zone.is-agent .tab { background: var(--accent-secondary); }
    .loop-m-zone.is-human .tab { background: var(--accent-gold); }
    .loop-m-zone.is-system .tab { background: var(--accent-primary); }
    .loop-m-zone.is-human .loop-m-chip {
      border-color: var(--accent-gold);
      box-shadow: 0 0 0 1px var(--accent-gold);
    }
    .loop-m-arrow {
      display: flex; justify-content: center;
      margin: -6px 0 12px;
      color: var(--ink-muted);
    }
    @media (max-width: 720px) {
      .loop-svg { display: none; }
      .loop-m { display: block; }
    }

    /* Demo console */
    .ac-wrap { display: flex; justify-content: center; }
    .ac {
      width: 100%; max-width: 880px;
      background: var(--bg-surface);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      padding: 28px;
      font-family: var(--font-sans);
    }
    @media (max-width: 720px) { .ac { padding: 18px 16px; } }
    .ac-head {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-hairline);
      margin-bottom: 20px;
    }
    .ac-head-left {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 600; color: var(--ink-primary);
    }
    .ac-status {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent-secondary);
      box-shadow: 0 0 0 3px rgba(13, 155, 132, 0.18);
    }
    .ac-head-tag {
      display: inline-flex; align-items: center;
      padding: 4px 10px; border-radius: 999px;
      background: var(--bg-subtle);
      border: 1px solid var(--border-hairline);
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--ink-muted);
    }

    /* Step indicator */
    .ac-steps {
      list-style: none; padding: 0; margin: 0 0 24px;
      display: flex; align-items: center;
      flex-wrap: nowrap;
      gap: 0;
    }
    .ac-step {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 10px;
      border: 1px solid var(--border-hairline);
      border-radius: 999px;
      background: var(--bg-subtle);
      font-size: 12px; font-weight: 600;
      color: var(--ink-muted);
      transition: background-color var(--dur-fast) var(--ease-out),
                  color var(--dur-fast) var(--ease-out),
                  border-color var(--dur-fast) var(--ease-out);
      white-space: nowrap;
    }
    .ac-step-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--border-strong);
      transition: background-color var(--dur-fast) var(--ease-out);
    }
    .ac-step.is-done {
      color: var(--accent-secondary);
      border-color: rgba(13, 155, 132, 0.4);
      background: rgba(13, 155, 132, 0.06);
    }
    .ac-step.is-done .ac-step-dot { background: var(--accent-secondary); }
    .ac-step.is-active {
      color: var(--accent-secondary);
      border-color: var(--accent-secondary);
      background: rgba(13, 155, 132, 0.08);
    }
    .ac-step.is-active .ac-step-dot {
      background: var(--accent-secondary);
      box-shadow: 0 0 0 3px rgba(13, 155, 132, 0.2);
    }
    .ac-step.is-gate.is-active {
      color: var(--accent-gold);
      border-color: var(--accent-gold);
      background: rgba(168, 132, 46, 0.08);
    }
    .ac-step.is-gate.is-active .ac-step-dot {
      background: var(--accent-gold);
      box-shadow: 0 0 0 3px rgba(168, 132, 46, 0.2);
    }
    .ac-step-sep {
      width: 18px; height: 1px;
      background: var(--border-hairline);
      flex-shrink: 1;
    }
    @media (max-width: 720px) {
      .ac-steps { flex-wrap: wrap; gap: 6px; }
      .ac-step-sep { display: none; }
      .ac-step { font-size: 11px; padding: 5px 8px; }
    }

    /* Stage content */
    .ac-stage {
      min-height: 200px;
      padding: 4px 0;
      animation: acFade var(--dur-base) var(--ease-out);
    }
    @keyframes acFade {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .ac-doc {
      background: var(--bg-subtle);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius);
      padding: 18px 20px;
      position: relative; overflow: hidden;
    }
    .ac-doc-title {
      font-size: 14px; font-weight: 600; color: var(--ink-primary);
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .ac-doc-icon {
      width: 18px; height: 22px; flex-shrink: 0;
      border: 1.2px solid var(--ink-muted);
      border-radius: 2px;
      position: relative;
    }
    .ac-doc-icon::after {
      content: ''; position: absolute;
      inset: 4px 3px auto 3px; height: 1px;
      background: var(--ink-muted);
      box-shadow: 0 4px 0 var(--ink-muted), 0 8px 0 var(--ink-muted);
    }
    .ac-doc-line {
      height: 6px; border-radius: 3px;
      background: var(--border-hairline);
      margin-bottom: 8px;
    }
    .ac-doc-line.w-100 { width: 100%; }
    .ac-doc-line.w-86 { width: 86%; }
    .ac-doc-line.w-72 { width: 72%; }
    .ac-doc-line.w-94 { width: 94%; }
    .ac-doc-line.w-60 { width: 60%; }
    .ac-doc-scan {
      position: absolute;

  <script>
    // Suppress the benign "ResizeObserver loop completed with undelivered notifications" message.
    (function(){
      const re = /ResizeObserver loop/;
      if (typeof ResizeObserver !== 'undefined') {
        const Native = ResizeObserver;
        window.ResizeObserver = class extends Native {
          constructor(cb) {
            super((entries, observer) => {
              requestAnimationFrame(() => { try { cb(entries, observer); } catch (e) {} });
            });
          }
        };
      }
      window.addEventListener('error', (e) => {
        if (e && e.message && re.test(e.message)) {
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      });
      const origError = console.error;
      console.error = function(...args) {
        const msg = args.map(a => (a && a.message) || String(a)).join(' ');
        if (re.test(msg)) return;
        return origError.apply(console, args);
      };
    })();  </script>

    const TEAL_HEX = '#0D9B84';

    const BLUE_HEX = '#0075C9';
    const NAVY_HEX = '#0A1F44';
    const BORDER_HEX = '#E4DFD6';
    const MUTED_HEX = '#5E6470';

    const AgentLoop = () => {
      const svgRef = React.useRef(null);
      const [paused, setPaused] = useState(false);
      const [reducedMotion, setReducedMotion] = useState(false);

      useEffect(() => {
        const rmq = window.matchMedia('(prefers-reduced-motion: reduce)');

        rmq.addEventListener ? rmq.addEventListener('change', onR) : rmq.addListener(onR);

      }, []);

      useEffect(() => {
        const svg = svgRef.current;
        if (!svg || typeof svg.pauseAnimations !== 'function') return;
        if (paused) svg.pauseAnimations(); else svg.unpauseAnimations();
      }, [paused]);

      /* Layout (desktop): viewBox 920x220. Token path traverses x=30 → 870 at y=185. */

          <rect x={x} y={y} width={w} height={h} rx={6} ry={6}

                stroke={emphasized ? accent : BORDER_HEX}
                strokeWidth={emphasized ? 1.8 : 1}/>
          {emphasized && (
            <rect x={x - 3} y={y - 3} width={w + 6} height={h + 6} rx={9} ry={9}

                style={{ fontFamily: 'Inter, system-ui, sans-serif' }}>
            {label}
          </text>
        </g>
      );

      const Zone = ({ x, y, w, h, label, accent, children }) => (
        <g>
          <rect x={x} y={y} width={w} height={h} rx={6} ry={6}
                fill="transparent" stroke={BORDER_HEX} strokeWidth={1} strokeDasharray="0"/>

                fontSize={11} fontWeight={600}
                fill={accent}
                style={{ fontFamily: 'Inter, system-ui, sans-serif', letterSpacing: '0.18em' }}>
            {label.toUpperCase()}
          </text>
          {children}
        </g>
      );

      const Arrow = ({ x1, x2, y }) => (
        <g>
          <line x1={x1} y1={y} x2={x2 - 8} y2={y}
                stroke={MUTED_HEX} strokeWidth={1.2}/>
          <path d={`M ${x2 - 8} ${y - 4} L ${x2} ${y} L ${x2 - 8} ${y + 4} Z`}
                fill={MUTED_HEX}/>
        </g>
      );

      return (
        <div className="loop-wrap"
             onMouseEnter={() => setPaused(true)}
             onMouseLeave={() => setPaused(false)}
             onFocus={() => setPaused(true)}
             onBlur={() => setPaused(false)}>

          {/* Desktop / tablet SVG */}
          <svg ref={svgRef}
               viewBox="0 0 920 220"
               xmlns="http://www.w3.org/2000/svg"
               className="loop-svg"
               role="img"
               aria-label="Agents read, flag, and route. A human approves. The system logs the evidence.">
            <Zone x={10}  y={20} w={480} h={185} label="Agent"  accent={TEAL_HEX}>
              <Chip x={30}  y={85} w={130} h={42} label="Reads and compares" accent={TEAL_HEX}/>
              <Chip x={175} y={85} w={130} h={42} label="Flags the gap"      accent={TEAL_HEX}/>
              <Chip x={320} y={85} w={160} h={42} label="Routes to owner"    accent={TEAL_HEX}/>
            </Zone>
            <Arrow x1={490} x2={550} y={106}/>
            <Zone x={550} y={10} w={200} h={205} label="Human" accent={GOLD_HEX}>
              <Chip x={570} y={78} w={160} h={56} label="Human approves" accent={GOLD_HEX} emphasized/>
            </Zone>
            <Arrow x1={750} x2={810} y={106}/>
