  <style>
    /* ━━━ H4 hero visual — point-cloud sphere + centered H4 monogram ━━━ */
    .h4-viz {
      position: relative;
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      aspect-ratio: 1 / 1;
      container-type: inline-size;
    }
    .h4-viz-canvas {
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    .h4-viz-canvas canvas { display: block; width: 100%; height: 100%; }

    /* Embedded H4 monogram — sits at the visual center of the sphere, fixed (no rotation) */
    .h4-monogram {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      pointer-events: none;
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 800;
      font-size: 25cqi;
      color: #0A1F44;
      opacity: 0.4;
      filter: blur(4px);
      text-transform: uppercase;
      letter-spacing: -0.04em;
      line-height: 1;
      user-select: none;
    }
    @media (max-width: 768px) {
      .h4-viz { max-width: 460px; }
    }

    /* ━━━ Skilling-at-scale homepage sections ━━━ */
    .hero-tertiary { margin-top: 20px; font-size: 15px; color: var(--ink-muted); }
    .hero-proof {
      margin-top: 28px; font-size: 12px; font-weight: 600;
      letter-spacing: 0.06em; color: var(--ink-muted); text-transform: uppercase;
    }

    /* ━━━ Batch 1D — Trust strip ━━━ */
    .trust-strip {
      max-width: 760px; margin: 56px auto 0;
      padding-top: 40px; border-top: 1px solid var(--border-hairline);
    }
    .trust-line {
      font-size: 16px; font-weight: 600; color: var(--ink-primary);
      letter-spacing: -0.005em; margin-bottom: 32px;
    }
    .trust-frameworks-label {
      display: block;
      font-size: 12px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--ink-muted);
      margin-bottom: 18px;
    }
    .framework-badges {
      list-style: none; margin: 0; padding: 0;
      display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;
    }
    .framework-badges li {
      font-size: 13px; font-weight: 600; color: var(--ink-body);
      padding: 9px 16px;
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius);
      background: var(--bg-surface);

    }
    @media (max-width: 768px) {
      .trust-strip { margin-top: 40px; padding-top: 32px; }
      .trust-line { font-size: 15px; }
    }

    /* ━━━ Phase 2C — Process, Insights, final CTA ━━━ */
    .process { background: var(--bg-base); }
    .process-grid {
      list-style: none; margin: 0; padding: 0;
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px;
    }
    .process-step { position: relative; }
    .process-step:not(:last-child)::after {
      content: ''; position: absolute;
      top: 19px; left: 50px; right: -24px; height: 2px;
      background: var(--border-hairline);
    }
    .process-num {
      width: 38px; height: 38px; border-radius: 999px;
      border: 2px solid var(--border-strong);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono); font-size: 14px; font-weight: 600;
      color: var(--ink-muted); background: var(--bg-base);
      margin-bottom: 18px; position: relative; z-index: 1;
    }
    .process-step.key .process-num {
      border-color: var(--accent-primary-h);
      background: var(--accent-primary-h); color: #fff;
    }
    .process-step h3 { font-size: 19px; margin-bottom: 6px; letter-spacing: -0.01em; }
    .process-step.key h3 { color: var(--accent-primary-h); }
    .process-label { font-size: 13px; font-weight: 600; color: var(--ink-muted); margin-bottom: 12px; }
    .process-step p { font-size: 14px; line-height: 1.6; color: var(--ink-body); }

      .process-step { padding-left: 56px; padding-bottom: 32px; }
      .process-step:last-child { padding-bottom: 0; }

        top: 38px; left: 18px; right: auto; bottom: 6px; width: 2px; height: auto;

      content: ''; position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(10,31,68,0.04) 1px, transparent 1px),

      background-size: 72px 72px;
      -webkit-mask-image: radial-gradient(118% 92% at 74% 2%, #000 30%, transparent 80%);
              mask-image: radial-gradient(118% 92% at 74% 2%, #000 30%, transparent 80%);

      content: ''; position: absolute; z-index: 0; pointer-events: none;

      width: 100%; height: 55%;
      background: linear-gradient(var(--accent-primary), transparent);
      animation: heroScroll 2.1s var(--ease) infinite;

    @media (max-width: 768px) { .hero-scroll { display: none; } }

    @media (prefers-reduced-motion: reduce) {
      .hero-reveal { opacity: 1; transform: none; animation: none; }
      .hero-home::after { animation: none; }

      border: 1px solid var(--border-hairline);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);

    .card-cta {

    /* Diagnostic preview */
    .diagnostic { background: var(--bg-base); }
    .diag-panel {

      border: 1px solid var(--border-hairline);

    .diag-dim-name { font-size: 16px; font-weight: 700; color: var(--ink-primary); display: flex; align-items: baseline; gap: 8px; }

    .diag-dim-desc { font-size: 15px; color: var(--ink-body); line-height: 1.55; }
    .diag-steps {

      border-top: 1px solid var(--border-hairline);

    .diag-step .n {

      background: var(--accent-primary-h); color: #fff;

    .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(212px, 1fr)); gap: 20px; }

    .h-card-sm { padding: 26px; }
    @media (max-width: 768px) { .h-card-sm { padding: 22px; } }
    .h-card-sm h3 { font-size: 18px; margin-bottom: 10px; letter-spacing: -0.005em; }

    .card-num {
      font-family: var(--font-mono); font-size: 13px;

    }
    .card-icon {
      width: 38px; height: 38px; border-radius: var(--radius);
      background: var(--accent-gold-soft); color: var(--accent-primary-h);
      display: flex; align-items: center; justify-content: center; margin-bottom: 16px;

    .section-cta { margin-top: 48px; display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }

    /* AI Agents */
    .ai-agents { background: var(--bg-surface); }
    .agent-coreidea {
      max-width: 62ch; margin: 0 auto 44px; text-align: center;

    .agent-coreidea strong { color: var(--ink-primary); font-weight: 600; }
    .agent-flow-panel {
      background: var(--bg-base);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius);
      padding: 36px 24px;

    .agent-flow { display: flex; align-items: center; justify-content: center; gap: 10px; }
    .flow-node {
      background: var(--bg-surface);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius);

    .flow-node-key {
      border-color: var(--border-accent);

      .agent-flow { flex-direction: column; }

    /* Governance */
    .governance { background: var(--bg-base); }

    /* Academy section */
    .academy-home { background: var(--bg-surface); }

  <script>
    // Suppress the benign "ResizeObserver loop completed with undelivered notifications" message —
    // browsers report it as an error but it is not actionable.
    (function(){
      const re = /ResizeObserver loop/;
      // Wrap ResizeObserver so callbacks run on next frame (avoids the loop warning entirely).
      if (typeof ResizeObserver !== 'undefined') {
        const Native = ResizeObserver;
        window.ResizeObserver = class extends Native {
          constructor(cb) {
            super((entries, observer) => {
              requestAnimationFrame(() => { try { cb(entries, observer); } catch (e) {} });
            });
          }
        };
      }
      window.addEventListener('error', (e) => {
        if (e && e.message && re.test(e.message)) {
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      });
      const origError = console.error;
      console.error = function(...args) {
        const msg = args.map(a => (a && a.message) || String(a)).join(' ');
        if (re.test(msg)) return;
        return origError.apply(console, args);
      };
      const origWarn = console.warn;
      console.warn = function(...args) {
        const msg = args.map(a => String(a)).join(' ');
        if (re.test(msg)) return;
        return origWarn.apply(console, args);
      };
    })();
  </script>
  <script>
    // Arm scroll-reveal before first paint so .reveal elements never flash.
    // Skipped under reduced-motion or when IntersectionObserver is unavailable,
    // in which case .reveal content stays fully visible.
    (function(){
      try {
        var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (!reduce && 'IntersectionObserver' in window) {
          document.documentElement.classList.add('reveal-ready');
        }
      } catch (e) {}
    })();
  </script>

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       SECTION 1 — HERO
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    /* Pulse schedule — deterministic so sphere + page-level rings stay in sync. */
    const pulseTimeForN = (n) => {
      const noise = ((Math.sin(n * 12.9898) * 43758.5453) % 1 + 1) % 1;
      return 1.2 + n * 5.5 + noise * 0.6;
    };
    const activePulses = (now) => {
      const result = [];
      const approxN = Math.floor((now - 1.2) / 5.5);
      for (let n = Math.max(0, approxN - 2); n <= approxN + 1; n++) {
        const t = pulseTimeForN(n);
        if (now - t >= 0 && now - t <= 5) result.push(t);
      }
      return result.slice(-3);
    };

    const Hero = () => {
      const heroRef    = React.useRef(null);
      const sphereRef  = React.useRef(null);
      const ringsRef   = React.useRef(null);
      const auraRef    = React.useRef(null);

      // Page-level resonance rings (canvas behind hero content)
      React.useEffect(() => {
        const canvas   = ringsRef.current;
        const heroEl   = heroRef.current;
        const sphereEl = sphereRef.current;
        const auraEl   = auraRef.current;
        if (!canvas || !heroEl || !sphereEl) return;
        const ctx = canvas.getContext('2d');
        const dpr = Math.min(window.devicePixelRatio || 1, 2);

        const resize = () => {
          canvas.width  = heroEl.clientWidth  * dpr;
          canvas.height = heroEl.clientHeight * dpr;
          canvas.style.width  = heroEl.clientWidth  + 'px';
          canvas.style.height = heroEl.clientHeight + 'px';
        };
        resize();
        const ro = new ResizeObserver(() => { requestAnimationFrame(resize); });
        ro.observe(heroEl);

        const reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const start = performance.now();
        let raf;
        let lastBoostT0 = -10;

        if (reduced) {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          if (auraEl) auraEl.style.opacity = '0.55';
          return () => { ro.disconnect(); };
        }

        const tick = () => {
          const now = (performance.now() - start) / 1000;
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          const sRect = sphereEl.getBoundingClientRect();
          const hRect = heroEl.getBoundingClientRect();
          const cx = (sRect.left + sRect.right) / 2 - hRect.left;
          const cy = (sRect.top  + sRect.bottom) / 2 - hRect.top;
          const sphereR = Math.min(sRect.width, sRect.height) / 2 * 0.92;

          ctx.save();
          ctx.scale(dpr, dpr);
          const pulses = activePulses(now);
          let auraIntensity = 0;
          for (const t0 of pulses) {
            const e = now - t0;
            if (e < 0) continue;
            if (e < 0.5) auraIntensity = Math.max(auraIntensity, 1 - e / 0.5);
            if (e < 2) continue;
            const ext = (e - 2) / 3;
            if (ext > 1) continue;
            const radius = sphereR + ext * 600;
            const alpha  = 0.15 * (1 - ext);
            const width  = 2.4 - ext * 1.2;
            ctx.beginPath();
            ctx.strokeStyle = `rgba(13, 155, 132, ${alpha})`;
            ctx.lineWidth   = width;
            ctx.shadowColor = `rgba(13, 155, 132, ${alpha * 0.7})`;
            ctx.shadowBlur  = 12 * (1 - ext * 0.5);
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.restore();

          if (auraEl) auraEl.style.opacity = String(0.55 + auraIntensity * 0.45);

          raf = requestAnimationFrame(tick);
        };
        tick();

        return () => {
          cancelAnimationFrame(raf);
          ro.disconnect();
        };
      }, []);

      return (
        <section className="hero hero-home" data-screen-label="Hero" ref={heroRef}>
          <canvas ref={ringsRef} className="hero-rings" aria-hidden="true"></canvas>

            </div>

            <div className="hero-visual hero-reveal d3">

            </div>

          <div className="hero-scroll" aria-hidden="true">
            <span className="hero-scroll-line"></span>

        </section>
      );

    /* H4 hero visual — Three.js point-cloud sphere with embedded H4 monogram.
       Subtle wireframe, occasional data streams along great circles, slow tilted rotation. */
    const EnergyEngine = ({ sphereRef }) => {
      const mountRef = React.useRef(null);

      React.useEffect(() => {
        const THREE = window.THREE;
        const mount = mountRef.current;
        if (!THREE || !mount) return;

        const w = () => mount.clientWidth  || 1;
        const h = () => mount.clientHeight || 1;

        const scene  = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, w() / h(), 0.1, 50);
        camera.position.set(0, 0, 4);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setSize(w(), h());
        renderer.setClearColor(0x000000, 0);
        mount.appendChild(renderer.domElement);

        /* ─── Lighting ─── */
        scene.add(new THREE.AmbientLight(0x1A2540, 0.5));
        const dir = new THREE.DirectionalLight(0xFFFFFF, 0.3);
        dir.position.set(0, 1.5, 2);
        scene.add(dir);

        /* Sphere group — tilted 15° on X, rotates on Y */
        const sphereGroup = new THREE.Group();
        sphereGroup.rotation.x = 15 * Math.PI / 180;
        scene.add(sphereGroup);

        const RAD = 1.5;
        const N = 2000;

        /* ─── COMPONENT 1 · DOT CLOUD (Fibonacci sphere) ─── */
        const positions = new Float32Array(N * 3);
        const colors    = new Float32Array(N * 3);
        const baseAlpha = new Float32Array(N);
        const pulseAmt  = new Float32Array(N);   // 0 = no pulse, otherwise pulse amplitude
        const pulsePh   = new Float32Array(N);
        const pulseSpd  = new Float32Array(N);

        const goldenAngle = Math.PI * (1 + Math.sqrt(5));
        for (let i = 0; i < N; i++) {
          // Fibonacci spherical distribution
          const phi   = Math.acos(1 - 2 * (i + 0.5) / N);
          const theta = goldenAngle * i;
          const sp = Math.sin(phi), cp = Math.cos(phi);
          positions[i*3]   = RAD * sp * Math.cos(theta);
          positions[i*3+1] = RAD * sp * Math.sin(theta);
          positions[i*3+2] = RAD * cp;

          // Color: 65% teal, 25% electric blue, 10% white
          const roll = Math.random();
          let r, g, b;
          if (roll < 0.65)      { r = 0.051; g = 0.608; b = 0.518; }   // teal
          else if (roll < 0.90) { r = 0.373; g = 0.522; b = 0.937; }   // electric blue
          else                  { r = 1.000; g = 1.000; b = 1.000; }   // white
          const br = 0.7 + Math.random() * 0.3;
          colors[i*3]   = r * br;
          colors[i*3+1] = g * br;
          colors[i*3+2] = b * br;

          baseAlpha[i] = 1.0;
          // 5% of dots pulse
          if (Math.random() < 0.05) {
            pulseAmt[i] = 0.25 + Math.random() * 0.25;
            pulsePh[i]  = Math.random() * Math.PI * 2;
            pulseSpd[i] = 2 * Math.PI / (2 + Math.random() * 2); // 2–4s period
          }
        }

        const dotsGeom = new THREE.BufferGeometry();
        dotsGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        // Store originals separately so pulse modulation can reference an unchanging base.
        const origColors = new Float32Array(colors);
        dotsGeom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        const dotsMat = new THREE.PointsMaterial({
          size: 0.025, sizeAttenuation: true, vertexColors: true,
          transparent: true, opacity: 0.85, depthWrite: false,
          blending: THREE.AdditiveBlending,
        });
        const dots = new THREE.Points(dotsGeom, dotsMat);
        sphereGroup.add(dots);

        /* ─── COMPONENT 2 · WIREFRAME (8 latitudes + 12 longitudes) ─── */
        const wireMat = new THREE.LineBasicMaterial({
          color: 0xFFFFFF, transparent: true, opacity: 0.11, depthWrite: false,
        });
        const wireGeom = new THREE.BufferGeometry();
        const wireVerts = [];

        // 8 latitude rings — heights from -0.9R to +0.9R
        const latCount = 8;
        for (let li = 0; li < latCount; li++) {
          const phi = ((li + 1) / (latCount + 1)) * Math.PI; // skip poles
          const y = Math.cos(phi) * RAD;
          const r = Math.sin(phi) * RAD;
          const segs = 96;
          for (let s = 0; s < segs; s++) {
            const a1 = (s     / segs) * Math.PI * 2;
            const a2 = ((s+1) / segs) * Math.PI * 2;
            wireVerts.push(r * Math.cos(a1), y, r * Math.sin(a1));
            wireVerts.push(r * Math.cos(a2), y, r * Math.sin(a2));
          }
        }
        // 12 longitude arcs — pole-to-pole great circles
        const lonCount = 12;
        for (let li = 0; li < lonCount; li++) {
          const lon = (li / lonCount) * Math.PI * 2;
          const segs = 64;
          for (let s = 0; s < segs; s++) {
            const phi1 = (s     / segs) * Math.PI;
            const phi2 = ((s+1) / segs) * Math.PI;
            const r1 = Math.sin(phi1) * RAD, y1 = Math.cos(phi1) * RAD;
            const r2 = Math.sin(phi2) * RAD, y2 = Math.cos(phi2) * RAD;
            wireVerts.push(r1 * Math.cos(lon), y1, r1 * Math.sin(lon));
            wireVerts.push(r2 * Math.cos(lon), y2, r2 * Math.sin(lon));
          }
        }
        wireGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(wireVerts), 3));
        const wire = new THREE.LineSegments(wireGeom, wireMat);
        sphereGroup.add(wire);

        /* ─── COMPONENT 4 · DATA STREAMS along great circles ─── */
        const MAX_STREAMS = 2;
        const STREAM_RES = 48;      // segments along the arc
        const STREAM_LEN = 0.35;    // fraction of full great-circle length the stream spans
        const STREAM_DURATION = 2.6; // seconds

        const streams = [];
        for (let i = 0; i < MAX_STREAMS; i++) {
          const sPos = new Float32Array(STREAM_RES * 6); // segments use 2 verts each
          const sCol = new Float32Array(STREAM_RES * 6);
          const sGeom = new THREE.BufferGeometry();
          sGeom.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
          sGeom.setAttribute('color',    new THREE.BufferAttribute(sCol, 3));
          const sMat = new THREE.LineBasicMaterial({
            vertexColors: true, transparent: true, opacity: 1.0, depthWrite: false,
            blending: THREE.AdditiveBlending,
          });
          const line = new THREE.LineSegments(sGeom, sMat);
          line.visible = false;
          sphereGroup.add(line);
          streams.push({
            line, geom: sGeom, mat: sMat, positions: sPos, colors: sCol,
            t0: -100, axis: new THREE.Vector3(0, 1, 0), startAngle: 0,
          });
        }

        const spawnStream = (slotIdx, now) => {
          const s = streams[slotIdx];
          // Random great-circle: pick a random unit axis perpendicular to a random start point
          // Build via two random orthonormal vectors u, v on the unit sphere
          const u = new THREE.Vector3(
            Math.random() * 2 - 1, Math.random() * 2 - 1, Math.random() * 2 - 1
          ).normalize();
          let v = new THREE.Vector3(
            Math.random() * 2 - 1, Math.random() * 2 - 1, Math.random() * 2 - 1
          );
          v.sub(u.clone().multiplyScalar(u.dot(v))).normalize();
          s.axisU = u;
          s.axisV = v;
          s.startAngle = Math.random() * Math.PI * 2;
          s.t0 = now;
          s.line.visible = true;
        };

        const updateStream = (s, now) => {
          const elapsed = now - s.t0;
          if (elapsed < 0 || elapsed > STREAM_DURATION) {
            s.line.visible = false;
            return;
          }
          // Travel progresses from 0 to 1, the visible arc spans [head - STREAM_LEN, head]
          const head = (elapsed / STREAM_DURATION) * (Math.PI * 2 * 0.55); // ~55% of full circle
          const tail = head - STREAM_LEN * Math.PI * 2;
          const surface = RAD * 1.01;
          const pos = s.positions, col = s.colors;
          // Build STREAM_RES segments along the head→tail arc
          for (let i = 0; i < STREAM_RES; i++) {
            const a1 = tail + (i     / STREAM_RES) * (head - tail);
            const a2 = tail + ((i+1) / STREAM_RES) * (head - tail);
            // Position on great circle: cos(a)·u + sin(a)·v
            const p1x = surface * (Math.cos(s.startAngle + a1) * s.axisU.x + Math.sin(s.startAngle + a1) * s.axisV.x);
            const p1y = surface * (Math.cos(s.startAngle + a1) * s.axisU.y + Math.sin(s.startAngle + a1) * s.axisV.y);
            const p1z = surface * (Math.cos(s.startAngle + a1) * s.axisU.z + Math.sin(s.startAngle + a1) * s.axisV.z);
            const p2x = surface * (Math.cos(s.startAngle + a2) * s.axisU.x + Math.sin(s.startAngle + a2) * s.axisV.x);
            const p2y = surface * (Math.cos(s.startAngle + a2) * s.axisU.y + Math.sin(s.startAngle + a2) * s.axisV.y);
            const p2z = surface * (Math.cos(s.startAngle + a2) * s.axisU.z + Math.sin(s.startAngle + a2) * s.axisV.z);
            pos[i*6+0] = p1x; pos[i*6+1] = p1y; pos[i*6+2] = p1z;
            pos[i*6+3] = p2x; pos[i*6+4] = p2y; pos[i*6+5] = p2z;
            // Fade along stream: head bright (white core), tail teal-dim
            const u1 = i / STREAM_RES;
            const u2 = (i + 1) / STREAM_RES;
            const intensity1 = Math.pow(u1, 1.4);
            const intensity2 = Math.pow(u2, 1.4);
            // Mix teal (0.05, 0.61, 0.52) → white (1,1,1) by intensity
            col[i*6+0] = 0.051 + (1 - 0.051) * intensity1;
            col[i*6+1] = 0.608 + (1 - 0.608) * intensity1;
            col[i*6+2] = 0.518 + (1 - 0.518) * intensity1;
            col[i*6+3] = 0.051 + (1 - 0.051) * intensity2;
            col[i*6+4] = 0.608 + (1 - 0.608) * intensity2;
            col[i*6+5] = 0.518 + (1 - 0.518) * intensity2;
          }
          // Fade the overall opacity at the start and end of the lifecycle
          const lifeT = elapsed / STREAM_DURATION;
          const fade = lifeT < 0.15 ? lifeT / 0.15 : lifeT > 0.8 ? (1 - lifeT) / 0.2 : 1;
          s.mat.opacity = Math.max(0, Math.min(1, fade));
          s.geom.attributes.position.needsUpdate = true;
          s.geom.attributes.color.needsUpdate    = true;
        };

        let nextSpawn = 1.0; // first stream spawns at t=1s

        /* ─── ANIMATE ─── */
        const reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        let raf;
        const start = performance.now();

        const tick = () => {
          const now = (performance.now() - start) / 1000;

          if (!reduced) {
            sphereGroup.rotation.y = (now / 60) * Math.PI * 2;

            // Per-dot pulse — modulate color brightness of the 5% flagged dots via a ShaderMaterial-lite
            // pattern: we keep originals in `colors`, scale into the live buffer.
            const cArr = dotsGeom.attributes.color.array;
            let pulseTouched = false;
            for (let i = 0; i < N; i++) {
              if (pulseAmt[i] === 0) continue;
              pulseTouched = true;
              const mult = 1 + Math.sin(now * pulseSpd[i] + pulsePh[i]) * pulseAmt[i];
              cArr[i*3]   = Math.min(1, origColors[i*3]   * mult);
              cArr[i*3+1] = Math.min(1, origColors[i*3+1] * mult);
              cArr[i*3+2] = Math.min(1, origColors[i*3+2] * mult);
            }
            if (pulseTouched) dotsGeom.attributes.color.needsUpdate = true;

            // Streams — spawn periodically
            if (now >= nextSpawn) {
              const slot = streams.findIndex(s => !s.line.visible);
              if (slot >= 0) spawnStream(slot, now);
              nextSpawn = now + 2.5 + Math.random() * 1.5; // 2.5–4s
            }
            streams.forEach(s => { if (s.line.visible) updateStream(s, now); });
          }

          renderer.render(scene, camera);
          raf = requestAnimationFrame(tick);
        };
        if (reduced) renderer.render(scene, camera); else tick();

        /* ─── Resize ─── */
        const onResize = () => {
          if (!mount) return;
          renderer.setSize(w(), h());
          camera.aspect = w() / h();
          camera.updateProjectionMatrix();
        };
        window.addEventListener('resize', onResize);
        const ro = new ResizeObserver(() => requestAnimationFrame(onResize));
        ro.observe(mount);

        /* ─── Cleanup ─── */
        return () => {
          cancelAnimationFrame(raf);
          window.removeEventListener('resize', onResize);
          ro.disconnect();
          try { mount.removeChild(renderer.domElement); } catch (e) {}
          renderer.dispose();
          dotsGeom.dispose(); dotsMat.dispose();
          wireGeom.dispose(); wireMat.dispose();
          streams.forEach(s => { s.geom.dispose(); s.mat.dispose(); });
        };
      }, []);

      return (
        <div className="h4-viz" ref={sphereRef} aria-hidden="true">
          <div ref={mountRef} className="h4-viz-canvas"></div>
          <div className="h4-monogram">H4</div>
        </div>
      );
    };

    const App = () => {
      useEffect(() => {
        if (!document.documentElement.classList.contains('reveal-ready')) return;
        if (!('IntersectionObserver' in window)) return;
        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              e.target.classList.add('is-visible');
              io.unobserve(e.target);
            }
          });
        }, { rootMargin: '0px 0px -10% 0px', threshold: 0.08 });
        document.querySelectorAll('.reveal').forEach(el => io.observe(el));
        return () => io.disconnect();
      }, []);
