<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Course Catalog · Academy · Horizon4 AI</title>
  <meta name="description" content="Browse AI training courses and programs by audience, type, level, and language for public administration, teachers, and business teams.">
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/site.css">
  <link rel="stylesheet" href="/styles/pages.css">
  <style>
    .private-banner {
      background: var(--bg-surface, #FFFFFF);
      border: 1px solid var(--hairline, #E2E5EA);
      border-radius: 4px;
      padding: 28px 32px;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }
    .private-banner .pb-text h3 { margin: 0 0 6px; }
    .private-banner .pb-text p { margin: 0; color: var(--ink-muted, #5A6472); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="/scripts/chrome.jsx"></script>

  <script type="text/babel">
    const { useState, useMemo } = React;
    const { Nav, Footer, route } = window.H4Chrome;

    /* ─── COURSES ─────────────────────────── */
    /* status: 'available' | 'soon' | 'institutional' */
    const COURSES = [
      {
        t: 'Public Administration AI Skills',
        d: 'Flagship institutional program building practical AI skills across ministries, agencies, and municipalities, with human review and public accountability.',
        aud: 'Public administration', type: 'Institutional program', lvl: 'Intermediate', lang: 'Bilingual',
        fmt: 'Multi-cohort institutional program', status: 'institutional', cta: 'Request Program',
        flag: true,
      },
      {
        t: 'AI for Public Servants',
        d: 'Document drafting, summarization, and citizen communication workflows for public servants, with disclosure norms built in.',
        aud: 'Public administration', type: 'Institutional program', lvl: 'Beginner', lang: 'Bilingual',
        fmt: '1-day intensive', status: 'institutional', cta: 'Request Program',
      },
      {
        t: 'AI Governance for Municipalities',
        d: 'Policy, procurement awareness, and oversight practices for responsible municipal AI adoption.',
        aud: 'Leaders / strategy', type: 'Institutional program', lvl: 'Leadership', lang: 'Bilingual',
        fmt: '2-day program', status: 'institutional', cta: 'Discuss Program',
      },
      {
        t: 'AI for Teachers and Professors',
        d: 'Lesson design, student feedback, research support, and responsible classroom use of AI.',
        aud: 'Teachers / education', type: 'Cohort', lvl: 'Beginner', lang: 'Bilingual',
        fmt: '1-day intensive', status: 'available', cta: 'View Course',
      },
      {
        t: 'Teacher AI Classroom Practice',
        d: 'Hands-on classroom AI activities, assessment redesign, and age-appropriate AI literacy for education teams.',
        aud: 'Teachers / education', type: 'Institutional program', lvl: 'Intermediate', lang: 'Bilingual',
        fmt: 'Role-specific cohort', status: 'institutional', cta: 'Request Program',
      },
      {
        t: 'AI and Academic Integrity',
        d: 'Assignment redesign, detection limits, disclosure norms, and an academic-integrity policy starter.',
        aud: 'Teachers / education', type: 'Workshop', lvl: 'Intermediate', lang: 'Bilingual',
        fmt: '1-day intensive', status: 'available', cta: 'View Course',
      },
      {
        t: 'AI Productivity for SMEs',
        d: 'Practical AI for small businesses across operations, marketing, sales, and administration.',
        aud: 'Business teams', type: 'Workshop', lvl: 'Beginner', lang: 'Bilingual',
        fmt: '1-day intensive', status: 'available', cta: 'View Course',
      },
      {
        t: 'AI for Professional Services',
        d: 'AI workflows for legal, audit, consulting, and advisory teams, with confidentiality built in.',
        aud: 'Business teams', type: 'Cohort', lvl: 'Intermediate', lang: 'Bilingual',
        fmt: '4-week cohort', status: 'available', cta: 'View Course',
      },
      {
        t: 'Business & Organization AI Productivity Program',
        d: 'Team-wide AI productivity for documents, meetings, reporting, and client work, with shared prompt systems.',
        aud: 'Business teams', type: 'Institutional program', lvl: 'Intermediate', lang: 'Bilingual',
        fmt: 'Multi-cohort program', status: 'institutional', cta: 'Request Program',
      },
      {
        t: 'Agentic AI Discovery Workshop',
        d: 'Identify candidate workflows for human-approved AI agents, and the ones that should not be automated.',
        aud: 'General professionals', type: 'Institutional program', lvl: 'Beginner', lang: 'Bilingual',
        fmt: '3-hour workshop', status: 'institutional', cta: 'Discuss Agentic Workflow',
      },
      {
        t: 'Human-Approved AI Assistants',
        d: 'Design internal assistants with approval gates, document grounding, and review logs.',
        aud: 'Technical / builders', type: 'Cohort', lvl: 'Technical', lang: 'Bilingual',
        fmt: '2-day lab', status: 'soon', cta: 'Join Waitlist', altCta: 'Discuss Agentic Workflow',
      },
      {
        t: 'AI Champions Program',
        d: 'Train-the-trainer program that builds internal champions to sustain AI adoption across an institution.',
        aud: 'Leaders / strategy', type: 'Institutional program', lvl: 'Leadership', lang: 'Bilingual',
        fmt: 'Champions cohort', status: 'institutional', cta: 'Request Program',
      },
      {
        t: 'AI Workplace Fundamentals',
        d: 'How AI works, where it helps, where it fails, and how to use it responsibly in everyday work.',
        aud: 'General professionals', type: 'Cohort', lvl: 'Beginner', lang: 'Bilingual',
        fmt: '4-week cohort', status: 'available', cta: 'View Course',
      },
      {
        t: 'Responsible AI and Data Privacy',
        d: 'Data privacy, disclosure, oversight, and privacy-aware AI use for everyday workflows.',
        aud: 'General professionals', type: 'Workshop', lvl: 'Beginner', lang: 'Bilingual',
        fmt: '3-hour workshop', status: 'soon', cta: 'Join Waitlist',
      },
      {
        t: 'AI Data and Reporting',
        d: 'AI assistants for cleaning, exploring, and explaining data, plus dashboards and decision support.',
        aud: 'Technical / builders', type: 'Cohort', lvl: 'Intermediate', lang: 'Bilingual',
        fmt: '4-week cohort', status: 'soon', cta: 'Join Waitlist',
      },
      {
        t: 'AI Marketing and Communication',
        d: 'Strategy, content, and campaign workflows that respect brand voice and originality.',
        aud: 'Business teams', type: 'Cohort', lvl: 'Beginner', lang: 'Bilingual',
        fmt: '4-week cohort', status: 'soon', cta: 'Join Waitlist',
      },
      {
        t: 'Agentic AI Strategy for Leaders',
        d: 'Where assistants pay back, where agents are premature, and how to govern both.',
        aud: 'Leaders / strategy', type: 'Workshop', lvl: 'Leadership', lang: 'Bilingual',
        fmt: '1-day intensive', status: 'soon', cta: 'Join Waitlist',
      },
    ];

    const AU  = ['All audiences', 'Public administration', 'Teachers / education', 'Business teams', 'Leaders / strategy', 'Technical / builders', 'General professionals'];
    const TY  = ['All program types', 'Workshop', 'Cohort', 'Private training', 'Institutional program', 'Coming soon'];
    const LV  = ['All levels', 'Beginner', 'Intermediate', 'Leadership', 'Technical'];
    const LG  = ['All languages', 'Albanian', 'English', 'Bilingual'];

    const STATUS_LABEL = { available: 'Available', soon: 'Coming soon', institutional: 'Institutional program' };

    /* ─── HERO ─────────────────────────────── */
    const Hero = () => (
      <section className="hero hero-compact" data-screen-label="Hero">
        <div className="container">
          <div className="eyebrow">Academy · Course Catalog</div>
          <h1 className="h1" style={{ marginTop: 24 }}>Browse courses and programs.</h1>
          <p className="body-xl hero-lead" style={{ marginTop: 32 }}>
            Filter by audience, program type, level, and language. Live,
            bilingual, hands-on AI training for public administration,
            teachers, and business teams.
          </p>
        </div>
      </section>
    );

    /* ─── FILTER BAR ───────────────────────── */
    const FilterBar = ({ s, set }) => (
      <div className="filter-bar">
        <div className="container">
          <div className="filter-row">
            <div className="filter-search">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="M21 21l-4.3-4.3"></path>
              </svg>
              <input placeholder="Search courses..." value={s.q} onChange={e => set({ ...s, q: e.target.value })}/>
            </div>
            <select className="filter-select" value={s.au} onChange={e => set({ ...s, au: e.target.value })}>{AU.map(o => <option key={o}>{o}</option>)}</select>
            <select className="filter-select" value={s.ty} onChange={e => set({ ...s, ty: e.target.value })}>{TY.map(o => <option key={o}>{o}</option>)}</select>
            <select className="filter-select" value={s.lv} onChange={e => set({ ...s, lv: e.target.value })}>{LV.map(o => <option key={o}>{o}</option>)}</select>
            <select className="filter-select" value={s.lg} onChange={e => set({ ...s, lg: e.target.value })}>{LG.map(o => <option key={o}>{o}</option>)}</select>
          </div>
        </div>
      </div>
    );

    /* ─── APP ───────────────────────────────── */
    const App = () => {
      const [s, set] = useState({ q: '', au: AU[0], ty: TY[0], lv: LV[0], lg: LG[0] });
      const matches = useMemo(() => COURSES.filter(c => {
        if (s.q && !(c.t + ' ' + c.d).toLowerCase().includes(s.q.toLowerCase())) return false;
        if (s.au !== AU[0] && c.aud !== s.au) return false;
        if (s.ty !== TY[0]) {
          if (s.ty === 'Coming soon') { if (c.status !== 'soon') return false; }
          else if (c.type !== s.ty) return false;
        }
        if (s.lv !== LV[0] && c.lvl !== s.lv) return false;
        if (s.lg !== LG[0] && c.lang !== s.lg) return false;
        return true;
      }), [s]);
      const reset = () => set({ q: '', au: AU[0], ty: TY[0], lv: LV[0], lg: LG[0] });

      return (
        <div data-screen-label="Course Catalog">
          <Nav/>
          <Hero/>
          <FilterBar s={s} set={set}/>

          <section style={{ background: 'var(--bg-base)', paddingTop: 0 }} data-screen-label="Results">
            <div className="container">
              <div className="private-banner">
                <div className="pb-text">
                  <h3 className="h4">Need this for your team?</h3>
                  <p>Request private training adapted to your institution, sector, and workflows.</p>
                </div>
                <a href={route('/academy/private')} className="btn btn-primary">Request private training</a>
              </div>

              <div className="results-bar">
                <span>{matches.length} {matches.length === 1 ? 'course' : 'courses'}</span>
                <button onClick={reset} className="reset-link">Reset filters</button>
              </div>

              {matches.length === 0 ? (
                <div className="empty">
                  <h3>No courses match your filters.</h3>
                  <p>Try removing one filter, or request a private training recommendation from Horizon4. We will suggest the best path based on your role, team, and goals.</p>
                  <div className="btn-row" style={{ justifyContent: 'center' }}>
                    <button className="btn btn-secondary" onClick={reset}>Reset filters</button>
                    <a href={route('/academy/private')} className="btn btn-primary">Request Private Training</a>
                  </div>
                </div>
              ) : (
                <div className="course-grid">
                  {matches.map(c => {
                    const ctaHref = c.status === 'available' ? route('/contact') : route('/contact');
                    return (
                      <div key={c.t} className={`course-card ${c.status === 'soon' ? 'coming' : ''}`}>
                        <span className={`course-badge ${c.status === 'soon' ? 'soon' : ''}`}>{STATUS_LABEL[c.status]}</span>
                        <div className="course-title">{c.t}</div>
                        <p className="course-desc">{c.d}</p>
                        <div className="course-tags">
                          <span className="course-tag pw">{c.aud}</span>
                          <span className="course-tag">{c.lvl}</span>
                          <span className="course-tag">{c.lang}</span>
                        </div>
                        <div className="course-meta">
                          <span>{c.fmt}</span>
                          <span>{c.type}</span>
                        </div>
                        <div className="course-actions">
                          <a href={ctaHref} className="btn btn-primary">{c.cta}</a>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </section>

          <Footer/>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
