<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Academy & Training · Horizon4 AI</title>
  <meta name="description" content="Professional AI training for public administration, education, legal and professional teams, business teams, and specialized roles in Albania.">
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/site.css">
  <link rel="stylesheet" href="/styles/pages.css">
  <style>
    .flag-grid { display: grid; gap: 24px; grid-template-columns: repeat(3, 1fr); }
    @media (max-width: 880px) { .flag-grid { grid-template-columns: 1fr; } }
    .flag-card {
      background: var(--bg-surface, #FFFFFF);
      border: 1px solid var(--hairline, #E2E5EA);
      border-radius: 4px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      scroll-margin-top: 96px;
    }
    .flag-card .accent { display: block; width: 40px; height: 3px; background: var(--accent-primary, #0075C9); margin-bottom: 20px; }
    .flag-card h3 { margin: 0 0 12px; }
    .flag-card p { flex: 1; margin: 0 0 24px; color: var(--ink-muted, #5A6472); }
    .flag-card .btn { align-self: flex-start; }
    .levels-grid { display: grid; gap: 16px; grid-template-columns: repeat(3, 1fr); }
    @media (max-width: 760px) { .levels-grid { grid-template-columns: 1fr; } }
    .level-cell {
      background: var(--bg-surface, #FFFFFF);
      border: 1px solid var(--hairline, #E2E5EA);
      border-radius: 4px;
      padding: 20px 24px;
      display: flex;
      gap: 16px;
      align-items: baseline;
    }
    .level-cell .num { color: var(--accent-primary, #0075C9); font-weight: 600; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="/scripts/chrome.jsx"></script>

  <script type="text/babel">
    const { useState } = React;
    const { Nav, Footer, ComputedSun, route } = window.H4Chrome;

    /* ─── HERO ─────────────────────────────── */
    const Hero = () => (
      <section className="hero hero-compact" data-screen-label="Hero">
        <div className="container">
          <div className="eyebrow">Horizon · Academy &amp; Training</div>
          <h1 className="h1">Professional AI training for teams, institutions, and specialized roles.</h1>
          <p className="body-xl hero-lead">
            Horizon4 Academy trains people to use AI better in real work:
            public servants, teachers and professors, lawyers and professional
            services, business and operations teams, and leaders. From basic
            AI literacy to role-specific workflows and responsible use.
          </p>
          <div className="hero-actions">
            <a href={route('/executive-briefing')} className="btn btn-primary">Book an AI Briefing</a>
            <a href={route('/academy/catalog')} className="btn btn-secondary">Browse Courses</a>
          </div>
        </div>
      </section>
    );

    /* ─── SKILLING AT SCALE + FLAGSHIP TRACKS ─── */
    const FLAGSHIPS = [
      {
        id: 'public-administration',
        t: 'Public Administration AI',
        d: 'AI skills for public servants, ministries, agencies, and municipalities: drafting, summarization, citizen-service workflows, procurement awareness, data privacy, human review, and public accountability.',
      },
      {
        id: 'teachers',
        t: 'Teachers & Education',
        d: 'AI skills for teachers, professors, and education institutions: lesson design, student feedback, classroom AI collaboration, age-appropriate AI literacy, assessment redesign, disclosure norms, and academic integrity.',
      },
      {
        id: 'business-teams',
        t: 'Business & Professional Teams',
        d: 'AI productivity training for business, operations, and professional teams, including lawyers and professional services: documents, meetings, reporting, client work, internal knowledge, and shared prompt systems.',
      },
    ];

    const Flagships = () => (
      <section data-screen-label="Who we train">
        <div className="container">
          <div className="section-head">
            <div className="eyebrow">Who we train</div>
            <h2 className="h2">Courses for the people who will actually use AI at work.</h2>
            <p className="body-xl">
              Horizon4 Academy trains people at the level where AI adoption
              actually succeeds: public servants serving citizens, teachers
              guiding students, and teams doing real organizational work.
            </p>
          </div>
          <div className="flag-grid">
            {FLAGSHIPS.map((f) => (
              <div key={f.id} id={f.id} className="flag-card">
                <span className="accent"></span>
                <h3 className="h3">{f.t}</h3>
                <p>{f.d}</p>
                <a href={route('/executive-briefing')} className="btn btn-primary">Book an AI Briefing</a>
              </div>
            ))}
          </div>
        </div>
      </section>
    );

    /* ─── INSTITUTIONAL ACADEMY LEVELS ──────── */
    const LEVELS = [
      ['01', '3-hour awareness workshop'],
      ['02', '1-day practical intensive'],
      ['03', '4-week role-specific cohort'],
      ['04', 'Private team training'],
      ['05', 'Institutional academy'],
      ['06', 'Train-the-trainer and champions program'],
      ['07', 'Donor-funded multi-cohort program'],
    ];

    const Levels = () => (
      <section style={{ background: 'var(--bg-base)' }} data-screen-label="Program levels">
        <div className="container">
          <div className="section-head">
            <div className="eyebrow">Program levels</div>
            <h2 className="h2">From one workshop to a national capability program.</h2>
          </div>
          <div className="levels-grid">
            {LEVELS.map(([n, name]) => (
              <div key={n} className="level-cell">
                <span className="num">{n}</span>
                <span>{name}</span>
              </div>
            ))}
          </div>
          <p className="body-xl" style={{ marginTop: 40 }}>
            Participants leave with tools they can use immediately, not just a
            certificate.
          </p>
        </div>
      </section>
    );

    /* ─── OPERATING MODEL ───────────────────── */
    const Operating = () => (
      <section className="fmt" data-screen-label="Operating model">
        <div className="container">
          <div className="section-head">
            <div className="eyebrow">Operating model</div>
            <h2 className="h2">How we work. Diagnose. Train. Equip. Embed.</h2>
          </div>
          <div className="fmt-strip">
            {[
              ['01', 'Diagnose'],
              ['02', 'Train'],
              ['03', 'Equip'],
              ['04', 'Embed'],
            ].map(([n, name]) => (
              <div key={n} className="fmt-cell">
                <div className="fmt-num">{n}</div>
                <div className="fmt-name">{name}</div>
              </div>
            ))}
          </div>
        </div>
      </section>
    );

    /* ─── WHAT THE ACADEMY IS ───────────────── */
    const What = () => (
      <section style={{ background: 'var(--bg-base)' }} data-screen-label="What it is">
        <div className="container">
          <div className="section-head">
            <div className="eyebrow">What the Academy is</div>
            <h2 className="h2">Built for Albanian work, not generic AI hype.</h2>
            <p className="body-xl">
              Every course is built for the institutions, sectors, and roles we
              actually serve. Practical artefacts, bilingual delivery,
              governance baked in.
            </p>
          </div>
          <div className="what-grid">
            {[
              ['01', 'Built for Albanian work', 'Programs adapted for Albanian workplaces, language, and institutional context, not translated from generic global curricula.'],
              ['02', 'Practical, not theoretical', 'Every program produces a concrete deliverable participants use the next day: a prompt set, a workflow, a policy, a plan.'],
              ['03', 'Governance-aware by default', 'Every program includes responsible AI, data privacy, and human oversight, built in and not added on.'],
            ].map(([n, t, d]) => (
              <div key={n} className="what-col">
                <div className="num">{n}</div>
                <h3 className="h4">{t}</h3>
                <p>{d}</p>
              </div>
            ))}
          </div>
        </div>
      </section>
    );

    /* ─── SPECIALIZED PATHWAYS ───────────────── */
    const PATHWAYS = [
      ['A', 'AI Fundamentals',                'Foundations of AI for everyday professional work.'],
      ['B', 'Public Administration AI',       'AI skills for ministries, agencies, and municipalities.'],
      ['C', 'Teacher & Education AI',         'Lesson design, classroom practice, and academic integrity.'],
      ['D', 'Business AI Productivity',       'AI for documents, meetings, reporting, and client work.'],
      ['E', 'Responsible AI & Data Privacy',  'Disclosure, oversight, and privacy-aware AI use.'],
      ['F', 'Agentic AI & Workflow Automation','Discover, design, and govern human-approved AI workflows.'],
      ['G', 'AI Data & Reporting',            'AI for analysis, dashboards, and decision support.'],
      ['H', 'AI Marketing & Communication',   'AI for content, campaigns, and communication.'],
      ['I', 'AI Builders & Systems',          'Prototype, build, and test reliable AI systems.'],
    ];

    const Pathways = () => (
      <section className="pathways" style={{ background: 'var(--bg-base)' }} data-screen-label="Specialized pathways">
        <div className="container">
          <div className="section-head">
            <div className="eyebrow">Specialized pathways</div>
            <h2 className="h2">Specialized pathways for deeper capability.</h2>
            <p className="body-xl">
              Beyond the flagship tracks, focused pathways build deeper skills
              for specific roles and goals.
            </p>
          </div>
          <div className="pathway-grid">
            {PATHWAYS.map(([l, name, tag]) => (
              <a key={l} href={route('/academy/catalog')} className="pathway-card">
                <span className="accent"></span>
                <span className="pathway-letter">{l}</span>
                <div className="pathway-name">{name}</div>
                <p className="pathway-tag">{tag}</p>
                <div className="pathway-foot">
                  <span className="pathway-link">View catalog →</span>
                </div>
              </a>
            ))}
          </div>
        </div>
      </section>
    );

    /* ─── PROGRAM BLOCKS ────────────────────── */
    const Programs = () => (
      <section className="blocks" data-screen-label="Programs">
        <div className="container">
          <div className="section-head">
            <div className="eyebrow">Programs</div>
            <h2 className="h2">From a single course to a full institutional academy.</h2>
          </div>
          <div className="block-card">
            <div>
              <h3>Public courses for individual professionals.</h3>
              <p>Live, instructor-led courses for individuals building practical AI skills alongside other Albanian professionals. Rolling schedule.</p>
            </div>
            <div className="actions">
              <a href={route('/academy/catalog')} className="btn btn-primary">Browse Catalog</a>
            </div>
          </div>
          <div className="block-card dark">
            <div>
              <h3>Bring Horizon4 to your team.</h3>
              <p>Custom AI training for your organization. Half-day to multi-week formats, adapted to your team's role, sector, and goals. Albanian, English, or bilingual delivery.</p>
            </div>
            <div className="actions">
              <a href={route('/academy/private')} className="btn btn-primary on-dark">Private Training</a>
            </div>
          </div>
          <div className="block-card muted">
            <div>
              <h3>Building an AI academy inside your institution.</h3>
              <p>For ministries, universities, and large organizations: a custom multi-cohort AI capability program with governance, training pathways, and internal champions.</p>
            </div>
            <div className="actions">
              <a href={route('/executive-briefing')} className="btn btn-secondary">Book an AI Briefing</a>
            </div>
          </div>
        </div>
      </section>
    );

    /* ─── CERTIFICATE ────────────────────────── */
    const Cert = () => (
      <section className="cert" data-screen-label="Certificate">
        <div className="container cert-grid">
          <div>
            <div className="eyebrow">Certificate of Completion</div>
            <h2 className="h2" style={{ marginBottom: 24 }}>A Horizon4 AI Academy certificate for every course.</h2>
            <p className="body-xl" style={{ marginBottom: 24 }}>
              Every course concludes with a Horizon4 AI Academy Certificate
              based on attendance, exercises, and a final deliverable. An
              industry-recognized credential roadmap launches in 2027.
            </p>
            <p className="body" style={{ color: 'var(--ink-muted)', maxWidth: '52ch' }}>
              We do not issue conformity certifications for the EU AI Act, ISO
              42001, or other external standards. We do build the capability
              your team needs to be ready for them.
            </p>
          </div>
          <div className="cert-visual" aria-hidden="true">
            <div className="cert-seal">Horizon4 AI Academy · Certificate of Completion</div>
            <div className="cert-name">Awarded to Participant Name</div>
            <div className="cert-course">AI Workplace Fundamentals · 4-week cohort · 2026</div>
            <div className="cert-issued">
              <div>
                <div className="lbl">Issued</div>
                <div className="val">December 2026</div>
              </div>
              <div>
                <div className="lbl">Verification ID</div>
                <div className="val">H4-AC-0001</div>
              </div>
            </div>
          </div>
        </div>
      </section>
    );

    /* ─── FAQ ────────────────────────────────── */
    const FAQ_ITEMS = [
      ['Who are these programs for?', 'Public servants, teachers and education institutions, businesses and organizations, NGOs, and donor-funded programs in Albania. Each program flags its primary audience and any prerequisites.'],
      ['Are programs in English or Albanian?', 'Programs are bilingual. Public courses run in Albanian, English, or mixed format. Private team training is delivered in your team\'s preferred language.'],
      ['What is the difference between a workshop, intensive, and cohort?', 'Awareness workshops are 3-hour focused sessions. Practical intensives are full-day deep dives. Role-specific cohorts run live over four weeks with practice between sessions and a final deliverable.'],
      ['Do participants get a certificate?', 'Every program concludes with a Horizon4 AI Academy Certificate of Completion based on attendance, exercises, and a final deliverable. We do not certify external standards.'],
      ['Can my institution commission private training?', 'Yes. We design private programs adapted to your sector, role mix, and institutional context, from half-day to multi-week formats, on-site or remote.'],
      ['How is a program scoped?', 'Each program is scoped to your audience, format, and goals. Scope and format are confirmed after a brief intake conversation.'],
    ];

    const FAQ = () => {
      const [open, setOpen] = useState(0);
      return (
        <section style={{ background: 'var(--bg-surface)' }} data-screen-label="FAQ">
          <div className="container">
            <div className="section-head">
              <div className="eyebrow">Frequently asked</div>
              <h2 className="h2">Common questions.</h2>
            </div>
            <div className="faq-list">
              {FAQ_ITEMS.map(([q, a], i) => (
                <div key={q} className="faq-item">
                  <button className="faq-q" aria-expanded={open === i} onClick={() => setOpen(open === i ? -1 : i)}>
                    <span>{q}</span>
                    <span className="icn">{open === i ? '−' : '+'}</span>
                  </button>
                  {open === i && <div className="faq-a">{a}</div>}
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    };

    /* ─── FINAL CTA (dark) ────────────────── */
    const CTA = () => (
      <section className="cta" data-screen-label="Final CTA">
        <div className="cta-inner">
          <div className="eyebrow on-dark">Start here</div>
          <h2 className="h2">Build practical AI capability in your institution.</h2>
          <p className="body-xl">
            Book a focused briefing for your team, or browse the full course
            catalog.
          </p>
          <div className="cta-row">
            <a href={route('/executive-briefing')} className="btn btn-primary on-dark">Book an AI Briefing</a>
            <a href={route('/academy/catalog')} className="btn-link on-dark">or browse the course catalog →</a>
          </div>
          <div className="cta-loc">Tirana, Albania · Local expertise, global AI governance perspective</div>
        </div>
      </section>
    );

    /* ─── APP ────────────────────────────────── */
    ReactDOM.createRoot(document.getElementById('root')).render(
      <div data-screen-label="Academy">
        <Nav/>
        <Hero/>
        <Flagships/>
        <What/>
        <Levels/>
        <Operating/>
        <Pathways/>
        <Programs/>
        <Cert/>
        <FAQ/>
        <CTA/>
        <Footer/>
      </div>
    );
  </script>
</body>
</html>
