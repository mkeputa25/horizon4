<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Donor & EU Programs · Horizon4 AI — AI capacity programs for donor-funded work</title>
  <meta name="description" content="Multi-year AI capability programs designed for EU AI Act alignment, donor M&E frameworks, and institutional sustainability.">
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/site.css">
  <style>
    /* ━━━ GovAI page-local styles ━━━ */

    /* Hero variant: full-width content, no sphere */
    .gov-hero {
      background: var(--bg-base);
      padding: 160px 0 96px;
      text-align: center;
    }
    .gov-hero .container { max-width: 880px; }
    .gov-hero .eyebrow { justify-content: center; margin-bottom: 24px; color: var(--accent-primary); }
    .gov-hero .h1 { margin-bottom: 24px; text-wrap: balance; }
    .gov-hero .hero-lead { max-width: 60ch; margin: 0 auto 40px; }
    .gov-hero .hero-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    @media (max-width: 768px) {
      .gov-hero { padding: 96px 0 64px; }
    }

    /* Generic icon-card (Sections 2, 3) */
    .icon-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .icon-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
    .icon-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
    @media (max-width: 1024px) {
      .icon-grid, .icon-grid.cols-3 { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .icon-grid, .icon-grid.cols-2, .icon-grid.cols-3 { grid-template-columns: 1fr; }
    }
    .icon-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius);
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: border-color .24s var(--ease);
    }
    .icon-card .icon { color: var(--ink-primary); }
    .icon-card .eyebrow { color: var(--ink-muted); margin: 0; }
    .icon-card .card-h { font-size: var(--type-h4); font-weight: 700; line-height: 1.25; color: var(--ink-primary); margin: 0; letter-spacing: -0.005em; }
    .icon-card .body { font-size: var(--type-body); line-height: 1.6; color: var(--ink-body); margin: 0; }
    .icon-card:hover { border-color: var(--border-strong); }

    /* Numbered offering cards (Section 4) */
    .offering-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    @media (max-width: 1024px) { .offering-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 640px)  { .offering-grid { grid-template-columns: 1fr; } }
    .offering-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius);
      padding: 32px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .offering-card .num {
      font-family: var(--font-mono);
      font-size: 14px;
      letter-spacing: 0.06em;
      color: var(--accent-primary);
      font-weight: 600;
    }
    .offering-card .card-h { font-size: var(--type-h4); font-weight: 700; line-height: 1.25; margin: 0; color: var(--ink-primary); }
    .offering-card .body { font-size: var(--type-body); line-height: 1.6; color: var(--ink-body); margin: 0; }

    /* Frameworks card with bottom meta line */
    .fw-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius);
      padding: 28px;
      display: flex; flex-direction: column; gap: 14px;
      min-height: 220px;
    }
    .fw-card .eyebrow { color: var(--ink-muted); margin: 0; }
    .fw-card .card-h  { font-size: var(--type-h4); font-weight: 700; line-height: 1.25; margin: 0; color: var(--ink-primary); }
    .fw-card .body    { font-size: 15px; line-height: 1.6; color: var(--ink-body); margin: 0; }
    .fw-card .meta    { margin-top: auto; padding-top: 14px; border-top: 1px solid var(--border-hairline);
                        font-family: var(--font-mono); font-size: 13px; color: var(--ink-muted); }
    .fw-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }
    @media (max-width: 1024px) { .fw-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 640px)  { .fw-grid { grid-template-columns: 1fr; } }

    /* Engagement cards (Section 7) — flagship variant */
    .eng-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      align-items: stretch;
    }
    @media (max-width: 1024px) { .eng-grid { grid-template-columns: 1fr; } }
    .eng-card {
      position: relative;
      background: var(--bg-surface);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius);
      padding: 32px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .eng-card.flagship {
      border-color: rgba(0, 117, 201, 0.30);
      box-shadow: 0 8px 24px rgba(0, 117, 201, 0.06);
    }
    .eng-card.flagship::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--accent-primary);
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .eng-card .tag { font-family: var(--font-sans); font-size: var(--type-eyebrow); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; color: var(--ink-muted); }
    .eng-card.flagship .tag { color: var(--accent-primary); }
    .eng-card .hr { height: 1px; background: var(--border-hairline); margin: 0; border: none; }
    .eng-card .card-h { font-size: var(--type-h3); font-weight: 700; line-height: 1.15; color: var(--ink-primary); margin: 0; letter-spacing: -0.01em; }
    .eng-card .meta { font-size: var(--type-body-xl); color: var(--ink-muted); margin: 0; }
    .eng-card .body { font-size: var(--type-body); line-height: 1.6; color: var(--ink-body); margin: 0; }
    .eng-card .bullets {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex; flex-direction: column; gap: 8px;
    }
    .eng-card .bullets li {
      font-size: 15px;
      line-height: 1.5;
      color: var(--ink-body);
      padding-left: 22px;
      position: relative;
    }
    .eng-card .bullets li::before {
      content: '';
      position: absolute;
      left: 6px; top: 0.55em;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent-secondary);
    }
    .eng-card .foot {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
      margin-top: auto;
    }
    .eng-card .price {
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    .eng-card .cta-link {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent-primary);
      text-decoration: none;
    }
    .eng-card .cta-link:hover { color: var(--accent-primary-h); }

    /* FAQ accordion */
    .faq-list {
      max-width: 880px;
      margin: 0 auto;
      display: flex; flex-direction: column;
    }
    .faq-item {
      border-top: 1px solid var(--border-hairline);
      padding: 0;
    }
    .faq-item:last-of-type { border-bottom: 1px solid var(--border-hairline); }
    .faq-item summary {
      cursor: pointer;
      list-style: none;
      padding: 24px 0;
      display: flex; justify-content: space-between; align-items: center; gap: 24px;
      font-size: var(--type-h4);
      font-weight: 600;
      color: var(--ink-primary);
      letter-spacing: -0.005em;
    }
    .faq-item summary::-webkit-details-marker { display: none; }
    .faq-item .chev {
      flex-shrink: 0;
      width: 18px; height: 18px;
      color: var(--ink-muted);
      transition: transform .24s var(--ease);
    }
    .faq-item[open] .chev { transform: rotate(180deg); }
    .faq-item .ans {
      font-size: var(--type-body);
      line-height: 1.65;
      color: var(--ink-body);
      max-width: 70ch;
      padding: 0 0 28px;
    }

    /* Related horizons mini cards */
    .rel-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    @media (max-width: 1024px) { .rel-grid { grid-template-columns: 1fr; } }
    .rel-card {
      display: flex; flex-direction: column; gap: 14px;
      padding: 28px;
      background: var(--bg-surface);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius);
      text-decoration: none;
      color: inherit;
      transition: border-color .24s var(--ease), box-shadow .24s var(--ease);
    }
    .rel-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-card); }
    .rel-card .eyebrow { color: var(--ink-muted); margin: 0; }
    .rel-card .card-h { font-size: var(--type-h4); font-weight: 700; color: var(--ink-primary); margin: 0; }
    .rel-card .body { font-size: var(--type-body); line-height: 1.6; color: var(--ink-body); margin: 0; }
    .rel-card .more { margin-top: auto; padding-top: 12px; font-size: 15px; font-weight: 600; color: var(--accent-primary); }

    /* Final CTA dark band — link row separated by middle dots */
    .gov-cta {
      background: var(--bg-deep);
      padding: 128px 0;
      text-align: center;
      color: #fff;
    }
    .gov-cta .container { max-width: 880px; }
    .gov-cta .eyebrow {
      justify-content: center;
      color: rgba(255, 255, 255, 0.65);
      margin-bottom: 24px;
    }
    .gov-cta .h2 { color: #fff; margin-bottom: 20px; text-wrap: balance; }
    .gov-cta .body-xl { color: var(--ink-on-dark-2); margin: 0 auto 40px; max-width: 60ch; }
    .gov-cta .links {
      display: inline-flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      font-size: var(--type-body-xl);
    }
    .gov-cta .links a {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1px solid rgba(255, 255, 255, 0.35);
      padding-bottom: 2px;
      transition: border-color .24s var(--ease);
    }
    .gov-cta .links a:hover { border-bottom-color: #fff; }
    .gov-cta .links .sep {
      color: rgba(255, 255, 255, 0.45);
      font-size: 22px;
      user-select: none;
    }
    @media (max-width: 768px) {
      .gov-cta { padding: 80px 0; }
      .gov-cta .links { flex-direction: column; gap: 14px; }
      .gov-cta .links .sep { display: none; }
    }

    /* Section bands — reusing tokens */
    .band { padding: var(--section-y) 0; }
    .band.surface { background: var(--bg-surface); }
    .band.base    { background: var(--bg-base); }
    @media (max-width: 768px) { .band { padding: var(--section-y-mobile) 0; } }

    /* Archetype cards (Section 2) */
    .arch-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    @media (max-width: 1024px) { .arch-grid { grid-template-columns: 1fr; } }
    .arch-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius);
      padding: 40px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .arch-card .arch-num { font-family: var(--font-sans); font-size: 56px; font-weight: 600; color: var(--ink-muted); letter-spacing: -0.02em; line-height: 1; margin-bottom: 6px; }
    .arch-card .eyebrow { color: var(--accent-primary); margin: 0; }
    .arch-card .card-h { font-size: var(--type-h4); font-weight: 700; line-height: 1.25; color: var(--ink-primary); margin: 0; letter-spacing: -0.005em; }
    .arch-card .body { font-size: var(--type-body); line-height: 1.6; color: var(--ink-body); margin: 0; }
    @media (max-width: 768px) { .arch-card { padding: 24px; } .arch-card .arch-num { font-size: 44px; } }

    /* Request Form (Section 8) */
    .form-band { padding: var(--section-y) 0; background: var(--bg-surface); }
    @media (max-width: 768px) { .form-band { padding: var(--section-y-mobile) 0; } }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start; }
    @media (max-width: 1024px) { .form-grid { grid-template-columns: 1fr; gap: 48px; } }
    .form-left .eyebrow { margin-bottom: 20px; }
    .form-left .h2 { margin-bottom: 24px; text-wrap: balance; }
    .form-left .body-xl { color: var(--ink-body); margin: 0 0 32px; max-width: 50ch; }
    .form-left .hr { height: 1px; background: var(--border-hairline); border: 0; margin: 32px 0; }
    .form-meta { display: flex; flex-direction: column; gap: 24px; }
    .form-meta .group { display: flex; flex-direction: column; gap: 6px; }
    .form-meta .eyebrow { margin: 0; color: var(--ink-muted); }
    .form-meta .body { font-size: var(--type-body); color: var(--ink-primary); margin: 0; font-weight: 500; }
    .form-meta .sub { font-size: 14px; color: var(--ink-muted); margin: 0; }
    .form-card { background: var(--bg-base); border: 1px solid var(--border-hairline); border-radius: var(--radius); padding: 40px; display: flex; flex-direction: column; gap: 18px; }
    @media (max-width: 768px) { .form-card { padding: 24px; } }
    .form-row { display: flex; flex-direction: column; gap: 6px; }
    .form-row label { font-size: var(--type-eyebrow); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; color: var(--ink-primary); }
    .form-row .req { color: var(--accent-primary); margin-left: 2px; }
    .form-row input, .form-row select, .form-row textarea {
      font-family: var(--font-sans); font-size: 15px; line-height: 1.5; color: var(--ink-primary);
      background: var(--bg-surface); border: 1px solid var(--border-hairline);
      border-radius: var(--radius); padding: 12px 14px; width: 100%;
      transition: border-color .24s var(--ease), box-shadow .24s var(--ease);
    }
    .form-row textarea { min-height: 110px; resize: vertical; font-family: inherit; }
    .form-row select {
      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8' fill='none' stroke='%236B7280' stroke-width='1.5'><path d='M1 1l5 5 5-5'/></svg>");
      background-repeat: no-repeat; background-position: right 14px center; padding-right: 36px;
    }
    .form-row input:focus, .form-row select:focus, .form-row textarea:focus {
      outline: none; border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(0, 117, 201, 0.12);
    }
    .form-submit {
      margin-top: 8px; padding: 14px 24px; width: 100%;
      background: var(--accent-primary); color: #fff; border: none;
      border-radius: var(--radius); font: inherit; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background .24s var(--ease);
    }
    .form-submit:hover { background: var(--accent-primary-h); }

    /* Final CTA donor variant */
    .gov-cta .cta-actions { display: inline-flex; gap: 24px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .gov-cta .btn-on-dark { background: #fff; color: var(--ink-primary); padding: 14px 28px; border-radius: var(--radius); font-weight: 600; font-size: 15px; text-decoration: none; transition: background .24s var(--ease); }
    .gov-cta .btn-on-dark:hover { background: var(--ink-on-dark-2); }
    .gov-cta .link-on-dark { color: #fff; text-decoration: none; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.35); padding-bottom: 2px; }
    .gov-cta .link-on-dark:hover { border-bottom-color: #fff; }
  </style>
</head>

  <script>
    // Suppress the benign "ResizeObserver loop completed with undelivered notifications" message.
    (function(){
      const re = /ResizeObserver loop/;
      if (typeof ResizeObserver !== 'undefined') {
        const Native = ResizeObserver;
        window.ResizeObserver = class extends Native {
          constructor(cb) {
            super((entries, observer) => {
              requestAnimationFrame(() => { try { cb(entries, observer); } catch (e) {} });
            });
          }
        };
      }
      window.addEventListener('error', (e) => {
        if (e && e.message && re.test(e.message)) {
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      });
      const origError = console.error;
      console.error = function(...args) {
        const msg = args.map(a => (a && a.message) || String(a)).join(' ');
        if (re.test(msg)) return;
        return origError.apply(console, args);
      };
    })();

    // Client-side router — translates clean paths in <a href> to actual filenames
    (function(){
      const ROUTES = {
        '/':                       'Horizon4 AI - Homepage.html',
        '/academy':                'Horizon4 AI - Academy.html',
        '/academy/catalog':        'Horizon4 AI - Course Catalog.html',
        '/academy/private':        'Horizon4 AI - Academy Private.html',
        '/advisory':               'Horizon4 AI - Advisory.html',
        '/audit':                  'Horizon4 AI - Audit.html',
        '/executive-briefing':     'Horizon4 AI - Executive Briefing.html',
        '/donor-programs':         'Horizon4 AI - Donor Programs.html',
        '/govai':                  'Horizon4 AI - GovAI.html',
        '/eduai':                  'Horizon4 AI - EduAI.html',
        '/businessai':             'Horizon4 AI - BusinessAI.html',
        '/strategyai':             'Horizon4 AI - StrategyAI.html',
        '/agentic-ai':             'Horizon4 AI - Agentic AI.html',
        '/research/publications':  'Horizon4 AI - Publications.html',
        '/research/insights':      'Horizon4 AI - Insights.html',
        '/research/frameworks':    'Horizon4 AI - Frameworks.html',
        '/about':                  'Horizon4 AI - About.html',
        '/team':                   'Horizon4 AI - Team.html',
        '/contact':                'Horizon4 AI - Contact.html',
      };
      document.addEventListener('click', function(e) {
        const a = e.target && e.target.closest && e.target.closest('a');
        if (!a) return;
        const href = a.getAttribute('href');
        if (!href) return;
        if (href.startsWith('mailto:') || href.startsWith('tel:') ||
            href.startsWith('http://') || href.startsWith('https://') ||
            href.startsWith('#')) return;
        if (Object.prototype.hasOwnProperty.call(ROUTES, href)) {
          e.preventDefault();
          window.location.href = encodeURI(ROUTES[href]);
        }
      }, true);
    })();
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       NAVIGATION (inherited from homepage)
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    const MEGA = {
      Academy: [
        { l: 'Overview & Pathways',   h: '/academy' },
        { l: 'Course Catalog',        h: '/academy/catalog' },
        { l: 'Private Team Training', h: '/academy/private' },
      ],
      Advisory: [
        { l: 'AI Readiness Audit',  h: '/audit' },
        { l: 'Executive Briefing',  h: '/executive-briefing' },
        { l: 'Donor / EU Programs', h: '/donor-programs' },
      ],
      Solutions: [
        { l: 'GovAI',      h: '/govai' },
        { l: 'EduAI',      h: '/eduai' },
        { l: 'BusinessAI', h: '/businessai' },
        { l: 'StrategyAI', h: '/strategyai' },
        { divider: true },
        { l: 'Agentic AI', h: '/agentic-ai' },
      ],
      Research: [
        { l: 'Publications', h: '/research/publications' },
        { l: 'Insights',     h: '/research/insights' },
        { l: 'Frameworks',   h: '/research/frameworks' },
      ],
      About: [
        { l: 'Team',    h: '/team' },
        { l: 'Mission', h: '/about' },
        { l: 'Contact', h: '/contact' },
      ],
    };

    const Brand = ({ className = 'nav-brand' }) => (
      <a href="/" className={className}>Horizon<span className="four">4</span>&nbsp;AI</a>
    );

    const Nav = () => {
      const [open, setOpen] = useState(null);
      const [drawer, setDrawer] = useState(false);
      const [lang, setLang] = useState('EN');
      const closeTimer = useRef(null);

      const onEnter = (k) => { clearTimeout(closeTimer.current); setOpen(k); };
      const onLeave = () => { closeTimer.current = setTimeout(() => setOpen(null), 120); };

      useEffect(() => { document.body.style.overflow = drawer ? 'hidden' : ''; }, [drawer]);

      return (
        <React.Fragment>
          <nav className="nav">
            <div className="nav-inner">
              <Brand/>
              <div className="nav-center">
                {Object.keys(MEGA).map(k => (
                  <div
                    key={k}
                    className={`nav-item ${open === k ? 'open' : ''}`}
                    onMouseEnter={() => onEnter(k)}
                    onMouseLeave={onLeave}
                  >
                    <button className="nav-trigger" aria-haspopup="true" aria-expanded={open === k}>
