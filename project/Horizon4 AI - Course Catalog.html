<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Course Catalog — Horizon4 AI Academy</title>
  <meta name="description" content="Browse practical AI courses by pathway, role, level, and format. Live, hands-on courses for Albanian professionals, teams, public servants, educators, SMEs, and institutions.">
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/site.css">
  <link rel="stylesheet" href="styles/pages.css">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="scripts/chrome.jsx"></script>

  <script type="text/babel">
    const { useState, useMemo } = React;
    const { Nav, Footer, route } = window.H4Chrome;

    /* ─── COURSES ─────────────────────────── */
    const COURSES = [
      // Launch cohort (Oct–Dec 2026)
      { t: 'AI Workplace Fundamentals',           pw: 'AI Fundamentals',          topic: 'Foundations', lvl: 'Beginner',     fmt: '4-week cohort',    dur: '3h · 1d · 4w', lang: 'Bilingual', aud: 'Professionals',         start: 'Cohort 1 · Oct 2026', avail: true,  d: 'How AI works, where it helps, where it fails, and how to use it responsibly in everyday work.' },
      { t: 'Prompt Engineering for Professionals', pw: 'AI Fundamentals',         topic: 'Prompting',   lvl: 'Beginner',     fmt: '4-week cohort',    dur: '3h · 1d · 4w', lang: 'Bilingual', aud: 'Professionals',         start: 'Cohort 1 · Oct 2026', avail: true,  d: 'Prompt design, testing, and reusable prompt systems for real professional tasks.' },
      { t: 'AI for Teachers and Professors',      pw: 'Sector Pathways',          topic: 'Education',   lvl: 'Beginner',     fmt: '1-day intensive',  dur: '3h · 1d · 4w', lang: 'Bilingual', aud: 'Educators',             start: 'Cohort 1 · Nov 2026', avail: true,  d: 'Lesson design, student feedback, research, and responsible classroom use of AI.' },
      { t: 'AI and Academic Integrity',           pw: 'Sector Pathways',          topic: 'Education',   lvl: 'Intermediate', fmt: '1-day intensive',  dur: '3h · 1d · 4w', lang: 'Bilingual', aud: 'Educators',             start: 'Cohort 1 · Nov 2026', avail: true,  d: 'Assignment redesign, detection limits, disclosure norms, and academic-integrity policy.' },
      { t: 'AI Productivity for SMEs',            pw: 'Sector Pathways',          topic: 'Business',    lvl: 'Beginner',     fmt: '1-day intensive',  dur: '3h · 1d · 4w', lang: 'Bilingual', aud: 'SME leaders',           start: 'Cohort 1 · Nov 2026', avail: true,  d: 'Practical AI for small businesses: operations, marketing, sales, and admin.' },
      { t: 'AI for Professional Services',        pw: 'Sector Pathways',          topic: 'Business',    lvl: 'Intermediate', fmt: '4-week cohort',    dur: '1d · 2d · 4w', lang: 'Bilingual', aud: 'Professional services', start: 'Cohort 1 · Dec 2026', avail: true,  d: 'AI workflows for legal, audit, consulting, and advisory teams — with confidentiality built in.' },

      // 2027 in development
      { t: 'AI Tools for Productivity',           pw: 'AI Fundamentals',          topic: 'Foundations', lvl: 'Beginner',     fmt: '3-hour workshop',  dur: '3h · 1d',      lang: 'Bilingual', aud: 'Professionals',         start: '2027', avail: false, d: 'Practical use of mainstream AI tools across docs, email, research, and meetings.' },
      { t: 'Responsible AI & Data Privacy',       pw: 'AI Fundamentals',          topic: 'Governance',  lvl: 'Beginner',     fmt: '3-hour workshop',  dur: '3h · 1d',      lang: 'Bilingual', aud: 'Professionals',         start: '2027', avail: false, d: 'Data privacy, disclosure, oversight, and GDPR-aware AI use for everyday workflows.' },
      { t: 'AI for Data Analysis',                pw: 'AI Data & Reporting',      topic: 'Data',        lvl: 'Intermediate', fmt: '4-week cohort',    dur: '1d · 4w',      lang: 'Bilingual', aud: 'Analysts',              start: '2027', avail: false, d: 'AI assistants for cleaning, exploring, and explaining tabular data responsibly.' },
      { t: 'AI for Marketing & Content',          pw: 'Marketing & Communication',topic: 'Marketing',   lvl: 'Beginner',     fmt: '4-week cohort',    dur: '1d · 4w',      lang: 'Bilingual', aud: 'Marketers',             start: '2027', avail: false, d: 'Strategy, content, and campaign workflows that respect brand voice and originality.' },
      { t: 'AI for Sales & Client Work',          pw: 'Marketing & Communication',topic: 'Sales',       lvl: 'Beginner',     fmt: '1-day intensive',  dur: '1d',           lang: 'Bilingual', aud: 'Sales teams',           start: '2027', avail: false, d: 'Outbound drafting, meeting prep, follow-up, and CRM workflows with human review.' },
      { t: 'AI Product Strategy',                 pw: 'Product & Innovation',     topic: 'Product',     lvl: 'Intermediate', fmt: '2-day lab',        dur: '2d',           lang: 'Bilingual', aud: 'Product managers',      start: '2027', avail: false, d: 'AI-first product strategy, opportunity scoring, and feasibility framing for serious products.' },
      { t: 'Project Management with AI',          pw: 'Product & Innovation',     topic: 'Project mgmt',lvl: 'Beginner',     fmt: '1-day intensive',  dur: '1d',           lang: 'Bilingual', aud: 'PMs',                   start: '2027', avail: false, d: 'AI-assisted planning, status reporting, risk tracking, and stakeholder communication.' },
      { t: 'Agentic AI Discovery Workshop',       pw: 'Agents & Automation',      topic: 'Agents',      lvl: 'Beginner',     fmt: '3-hour workshop',  dur: '3h',           lang: 'Bilingual', aud: 'Mixed teams',           start: '2027', avail: false, d: 'Identify candidate workflows for human-approved AI agents — and the ones that should not be automated.' },
      { t: 'No-Code AI Agents',                   pw: 'Agents & Automation',      topic: 'Agents',      lvl: 'Intermediate', fmt: '2-day lab',        dur: '2d',           lang: 'Bilingual', aud: 'Operators',             start: '2027', avail: false, d: 'Build a working internal assistant with approval gates, document grounding, and review logs.' },
      { t: 'Agentic AI Strategy for Leaders',     pw: 'Agents & Automation',      topic: 'Agents',      lvl: 'Advanced',     fmt: '1-day intensive',  dur: '1d',           lang: 'Bilingual', aud: 'Leaders',               start: '2027', avail: false, d: 'Where assistants pay back, where agents are premature, and how to govern both.' },
      { t: 'AI for Public Servants',              pw: 'Sector Pathways',          topic: 'Public sector', lvl: 'Beginner',   fmt: '1-day intensive',  dur: '1d',           lang: 'Bilingual', aud: 'Public servants',       start: '2027', avail: false, d: 'Document drafting, citizen communication, and admin workflows — with disclosure norms.' },
      { t: 'AI Governance for Municipalities',    pw: 'Sector Pathways',          topic: 'Public sector', lvl: 'Intermediate', fmt: '2-day lab',      dur: '2d',           lang: 'Bilingual', aud: 'Municipal leaders',     start: '2027', avail: false, d: 'Policy, procurement, and oversight practices for municipal AI adoption.' },
    ];

    const PW  = ['All pathways', 'AI Fundamentals', 'AI Data & Reporting', 'Marketing & Communication', 'Product & Innovation', 'Agents & Automation', 'Sector Pathways'];
    const LV  = ['All levels', 'Beginner', 'Intermediate', 'Advanced'];
    const FM  = ['All formats', '3-hour workshop', '1-day intensive', '2-day lab', '4-week cohort'];
    const AU  = ['All audiences', 'Professionals', 'Educators', 'SME leaders', 'Professional services', 'Public servants', 'Municipal leaders', 'Analysts', 'Marketers', 'Sales teams', 'Product managers', 'PMs', 'Operators', 'Leaders', 'Mixed teams'];
    const LG  = ['All languages', 'Bilingual', 'English', 'Albanian'];
    const AV  = ['All courses', 'Available now', 'Coming 2027'];

    /* ─── HERO ─────────────────────────────── */
    const Hero = () => (
      <section className="hero hero-compact" data-screen-label="Hero">
        <div className="container">
          <div className="eyebrow">Academy · Course Catalog</div>
          <h1 className="h1" style={{ marginTop: 24 }}>Browse all courses.</h1>
          <p className="body-xl hero-lead" style={{ marginTop: 32 }}>
            Filter by pathway, role, level, and format. Six launch courses
            are open for enrolment now; twelve more launch in 2027.
          </p>
        </div>
      </section>
    );

    /* ─── FILTER BAR ───────────────────────── */
    const FilterBar = ({ s, set }) => (
      <div className="filter-bar">
        <div className="container">
          <div className="filter-row">
            <div className="filter-search">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="M21 21l-4.3-4.3"></path>
              </svg>
              <input placeholder="Search courses…" value={s.q} onChange={e => set({ ...s, q: e.target.value })}/>
            </div>
            <select className="filter-select" value={s.pw} onChange={e => set({ ...s, pw: e.target.value })}>{PW.map(o => <option key={o}>{o}</option>)}</select>
            <select className="filter-select" value={s.lv} onChange={e => set({ ...s, lv: e.target.value })}>{LV.map(o => <option key={o}>{o}</option>)}</select>
            <select className="filter-select" value={s.fm} onChange={e => set({ ...s, fm: e.target.value })}>{FM.map(o => <option key={o}>{o}</option>)}</select>
            <select className="filter-select" value={s.au} onChange={e => set({ ...s, au: e.target.value })}>{AU.map(o => <option key={o}>{o}</option>)}</select>
            <select className="filter-select" value={s.lg} onChange={e => set({ ...s, lg: e.target.value })}>{LG.map(o => <option key={o}>{o}</option>)}</select>
            <select className="filter-select" value={s.av} onChange={e => set({ ...s, av: e.target.value })}>{AV.map(o => <option key={o}>{o}</option>)}</select>
          </div>
        </div>
      </div>
    );

    /* ─── APP ───────────────────────────────── */
    const App = () => {
      const [s, set] = useState({ q: '', pw: PW[0], lv: LV[0], fm: FM[0], au: AU[0], lg: LG[0], av: AV[0] });
      const matches = useMemo(() => COURSES.filter(c => {
        if (s.q && !(c.t + ' ' + c.d).toLowerCase().includes(s.q.toLowerCase())) return false;
        if (s.pw !== PW[0] && c.pw !== s.pw) return false;
        if (s.lv !== LV[0] && c.lvl !== s.lv) return false;
        if (s.fm !== FM[0] && c.fmt !== s.fm) return false;
        if (s.au !== AU[0] && c.aud !== s.au) return false;
        if (s.lg !== LG[0] && c.lang !== s.lg) return false;
        if (s.av === 'Available now' && !c.avail) return false;
        if (s.av === 'Coming 2027'  &&  c.avail) return false;
        return true;
      }), [s]);
      const reset = () => set({ q: '', pw: PW[0], lv: LV[0], fm: FM[0], au: AU[0], lg: LG[0], av: AV[0] });

      return (
        <div data-screen-label="Course Catalog">
          <Nav/>
          <Hero/>
          <FilterBar s={s} set={set}/>

          <section style={{ background: 'var(--bg-base)', paddingTop: 0 }} data-screen-label="Results">
            <div className="container">
              <div className="results-bar">
                <span>{matches.length} {matches.length === 1 ? 'course' : 'courses'}</span>
                <button onClick={reset} className="reset-link">Reset filters</button>
              </div>

              {matches.length === 0 ? (
                <div className="empty">
                  <h3>No courses match your filters.</h3>
                  <p>Try removing one filter, or request a private training recommendation from Horizon4. We'll suggest the best path based on your role, team, and goals.</p>
                  <div className="btn-row" style={{ justifyContent: 'center' }}>
                    <button className="btn btn-secondary" onClick={reset}>Reset filters</button>
                    <a href="#request" className="btn btn-primary">Request a recommendation</a>
                  </div>
                </div>
              ) : (
                <div className="course-grid">
                  {matches.map(c => (
                    <div key={c.t} className={`course-card ${!c.avail ? 'coming' : ''}`}>
                      <span className={`course-badge ${!c.avail ? 'soon' : ''}`}>{c.avail ? 'Available' : 'Coming 2027'}</span>
                      <div className="course-title">{c.t}</div>
                      <p className="course-desc">{c.d}</p>
                      <div className="course-tags">
                        <span className="course-tag pw">{c.pw}</span>
                        <span className="course-tag">{c.lvl}</span>
                        <span className="course-tag">{c.lang}</span>
                        <span className="course-tag">{c.aud}</span>
                      </div>
                      <div className="course-meta">
                        <span>{c.dur}</span>
                        <span>{c.start}</span>
                      </div>
                      <div className="course-actions">
                        <a href="#" className="btn btn-primary">{c.avail ? 'View course' : 'Notify me'}</a>
                        <a href="#request" className="btn btn-secondary">Private training</a>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </section>

          {/* Inline request block */}
          <section id="request" style={{ background: 'var(--bg-surface)' }} data-screen-label="Request">
            <div className="container" style={{ maxWidth: 960 }}>
              <div className="section-head">
                <div className="eyebrow">Private training</div>
                <h2 className="h2">Don't see what you need?</h2>
                <p className="body-xl">Tell us about your team and we'll recommend the right course, cohort, or private training format. Replies within 3 business days.</p>
              </div>
              <form className="inline-form" onSubmit={(e) => e.preventDefault()}>
                <label>Full name<input type="text" required/></label>
                <label>Work email<input type="email" required/></label>
                <label>Organization<input type="text" required/></label>
                <label>Role / title<input type="text"/></label>
                <label>Number of participants
                  <select><option>Just me</option><option>2–10</option><option>11–25</option><option>26–50</option><option>50+</option></select>
                </label>
                <label>Preferred format
                  <select><option>Public cohort</option><option>Private team training</option><option>Not sure — recommend</option></select>
                </label>
                <label className="full">What does your team need to do with AI?<textarea placeholder="Describe the role, the work, and what 'better' would look like in 3 months."></textarea></label>
                <label>Preferred language<select><option>English</option><option>Albanian</option><option>Bilingual</option></select></label>
                <label>Timeline<select><option>Within 30 days</option><option>This quarter</option><option>Next quarter</option><option>Exploring</option></select></label>
                <div className="full submit-row">
                  <button className="btn btn-primary" type="submit">Submit request</button>
                  <span className="legal">We respond within 3 business days.</span>
                </div>
              </form>
            </div>
          </section>

          <Footer/>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
